<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LeadFlow — Redhawk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rh-crimson:       #AE1E23;
    --rh-crimson-dark:  #851C2B;
    --rh-crimson-deep:  #6B1219;
    --rh-navy:          #0E2841;
    --rh-navy-mid:      #1a3a5c;
    --rh-teal:          #99C8BB;
    --rh-teal-light:    #C8E1DA;
    --rh-gold:          #FFC000;
    --rh-gold-light:    #FFF3CD;
    --bg:           #F5F6F8;
    --surface:      #FFFFFF;
    --border:       #E8E8E8;
    --text:         #1A1A1C;
    --text-muted:   #747474;
    --text-light:   #999999;
    --primary:        var(--rh-crimson);
    --primary-light:  #FBEAEA;
    --primary-hover:  var(--rh-crimson-dark);
    --danger:         #C00000;
    --success:        #2D7A5F;
    --warning:        #B8860B;
    --sidebar-width: 480px;
    --header-h: 60px;
    --toolbar-h: 52px;
    --radius: 6px;
    --shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-weight: 400; }
  #root { display: flex; flex-direction: column; height: 100vh; }
  /* ─── HEADER ─── */
  .app-header { height: var(--header-h); background: var(--rh-navy); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; border-bottom: 2px solid var(--rh-crimson); }
  .app-header .wordmark { display: flex; align-items: baseline; gap: 0; line-height: 1; }
  .app-header .wordmark .wm-lead { color: #fff; font-size: 20px; font-weight: 300; letter-spacing: 0.02em; }
  .app-header .wordmark .wm-flow { color: var(--rh-crimson); font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
  .app-header .wordmark-sub { color: rgba(255,255,255,0.4); font-size: 9px; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; margin-left: 8px; align-self: flex-end; margin-bottom: 3px; }
  .app-header .badge { background: rgba(255,255,255,0.12); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
  .app-header .pipeline-val { color: var(--rh-teal); font-size: 13px; margin-left: 4px; font-weight: 500; }
  .main { display: flex; flex: 1; overflow: hidden; }
  /* ─── TOOLBAR ─── */
  .toolbar { height: var(--toolbar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }
  .search-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); outline: none; transition: border-color .2s; }
  .search-wrap input:focus { border-color: var(--primary); background: #fff; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: background .15s, opacity .15s; white-space: nowrap; font-family: inherit; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn-primary { background: var(--rh-crimson); color: #fff; letter-spacing: 0.01em; }
  .btn-primary:hover:not(:disabled) { background: var(--rh-crimson-dark); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--rh-crimson-dark); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .select-sm { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface); cursor: pointer; outline: none; color: var(--text); font-family: inherit; }
  .spacer { flex: 1; }
  /* ─── TABLE ─── */
  .table-wrap { flex: 1; overflow: auto; scrollbar-width: auto; scrollbar-color: #c0c0c0 #f0f0f0; }
  .table-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
  .table-wrap::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
  .table-wrap::-webkit-scrollbar-thumb { background: #b0b0b0; border-radius: 4px; border: 2px solid #f0f0f0; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: #888; }
  .table-wrap::-webkit-scrollbar-corner { background: #f0f0f0; }
  .leads-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 13px; }
  .leads-table thead { position: sticky; top: 0; background: var(--surface); z-index: 10; }
  .leads-table th { padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  .leads-table th:hover { color: var(--text); }
  .sort-icon { opacity: .4; font-size: 10px; margin-left: 4px; }
  .sort-active { opacity: 1; color: var(--primary); }
  .leads-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .leads-table tr:hover td { background: #f7f4f4; }
  .leads-table tr.selected td { background: var(--primary-light); border-left: 3px solid var(--rh-crimson); }
  .lead-row { cursor: pointer; }
  .lead-name { font-weight: 600; color: var(--text); }
  .lead-org { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .lead-value { font-weight: 600; color: var(--success); }
  .no-value { color: var(--text-muted); font-style: italic; }
  .label-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin: 1px; }
  .activity-dot { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: #f0eeee; color: var(--text-muted); }
  /* ─── EMPTY ─── */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text-muted); padding: 60px 20px; text-align: center; }
  .empty-icon { font-size: 48px; opacity: .3; }
  /* ─── SIDE PANEL ─── */
  .side-panel { width: var(--sidebar-width); background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .panel-header { padding: 16px 20px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  .panel-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: var(--rh-navy); }
  .panel-org { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
  .panel-actions { display: flex; gap: 8px; padding-bottom: 14px; flex-wrap: wrap; }
  .panel-tabs { display: flex; gap: 0; border-top: 1px solid var(--border); margin-top: 2px; }
  .panel-tab { padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .panel-tab.active { color: var(--rh-crimson); border-bottom-color: var(--rh-crimson); }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .info-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px 12px; font-size: 13px; }
  .info-label { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  .info-value { font-weight: 500; }
  .info-value a { color: var(--rh-crimson); text-decoration: none; }
  .note-card { background: var(--rh-gold-light); border: 1px solid #f0d080; border-radius: var(--radius); padding: 12px; font-size: 13px; }
  .note-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .notes-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; resize: vertical; min-height: 80px; outline: none; font-family: inherit; }
  .notes-input:focus { border-color: var(--rh-crimson); box-shadow: 0 0 0 3px rgba(174,30,35,0.08); }
  .activity-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 13px; display: flex; gap: 12px; border-left: 3px solid var(--rh-teal); }
  .activity-icon { font-size: 18px; flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--rh-teal-light); }
  .activity-content { flex: 1; min-width: 0; }
  .activity-subject { font-weight: 600; color: var(--rh-navy); }
  .activity-meta { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .activity-done { opacity: .5; text-decoration: line-through; }
  /* ─── MODAL ─── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(14,40,65,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: var(--surface); border-radius: 10px; width: 100%; max-width: 520px; box-shadow: var(--shadow); display: flex; flex-direction: column; max-height: 90vh; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--rh-navy); border-radius: 10px 10px 0 0; }
  .modal-header h2 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7); line-height: 1; padding: 4px; }
  .modal-close:hover { color: #fff; }
  .modal-body { padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s, box-shadow .15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--rh-crimson); box-shadow: 0 0 0 3px rgba(174,30,35,0.08); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .label-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .label-option { padding: 4px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: border-color .15s, transform .1s; }
  .label-option:hover { transform: scale(1.05); }
  .label-option.sel { border-color: var(--rh-navy); }
  /* ─── FILTER BAR ─── */
  .filter-bar { display: flex; align-items: center; gap: 8px; padding: 0 16px 0 0; flex-wrap: wrap; }
  .filter-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--primary-light); color: var(--rh-crimson); border-radius: 12px; font-size: 12px; font-weight: 500; }
  .cb { width: 16px; height: 16px; cursor: pointer; accent-color: var(--rh-crimson); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1c8c8; border-radius: 3px; }
  /* ─── STAGE BADGES ─── */
  .status-badge      { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; }
  .stage-target      { background: #EBF0F7; color: #0E2841; }
  .stage-outreach    { background: var(--rh-gold-light); color: #7a5800; }
  .stage-discovery   { background: var(--rh-teal-light); color: #1a5c47; }
  .stage-proposal    { background: #f3e8ff; color: #6b21a8; }
  .stage-negotiation { background: var(--primary-light); color: var(--rh-crimson-dark); }
  .stage-won         { background: #dcfce7; color: #15803d; }
  .stage-lost        { background: #f3f4f6; color: #6b7280; }
  /* ─── FOLLOW-UP ALERTS ─── */
  .fu-banner { background: #fff8f0; border-bottom: 2px solid var(--rh-gold); padding: 9px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
  .fu-banner-icon { font-size: 16px; }
  .fu-banner-text { font-size: 13px; color: var(--text); white-space: nowrap; }
  .fu-banner-chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .fu-chip { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--rh-crimson); background: var(--primary-light); color: var(--rh-crimson); transition: background .15s; font-family: inherit; }
  .fu-chip:hover { background: var(--rh-crimson); color: #fff; }
  .fu-date-cell { font-size: 12px; }
  .fu-date-cell.fu-overdue { color: var(--rh-crimson); font-weight: 600; }
  .fu-date-cell.fu-today   { color: #b45309; font-weight: 600; }
  .fu-panel-alert { border-radius: var(--radius); padding: 10px 14px; font-size: 13px; line-height: 1.5; }
  .fu-panel-alert.fu-overdue { background: var(--primary-light); border-left: 3px solid var(--rh-crimson); color: var(--rh-crimson-dark); }
  .fu-panel-alert.fu-today   { background: #fff8f0; border-left: 3px solid var(--rh-gold); color: #7a5800; }
  .fu-panel-alert.fu-soon    { background: var(--rh-teal-light); border-left: 3px solid var(--rh-teal); color: #1a5c47; }
  .fu-inline { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
  .fu-inline.fu-overdue { background: var(--primary-light); color: var(--rh-crimson); }
  .fu-inline.fu-today   { background: #fff8f0; color: #b45309; }
  .fu-inline.fu-soon    { background: var(--rh-teal-light); color: #1a5c47; }
  .panel-section-label { font-size: 10px; font-weight: 700; color: var(--rh-crimson); text-transform: uppercase; letter-spacing: 0.1em; padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-bottom: -4px; }
  /* ─── LEFT NAV SIDEBAR ─── */
  .app-body { display: flex; flex: 1; overflow: hidden; }
  .left-nav { width: 210px; flex-shrink: 0; background: var(--rh-navy); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.07); overflow-y: auto; }
  .left-nav-section { padding: 14px 16px 5px; font-size: 10px; font-weight: 800; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .left-nav-section.not-first { border-top: 1px solid rgba(255,255,255,0.09); margin-top: 6px; padding-top: 12px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; margin: 1px 8px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500; font-family: inherit; text-align: left; width: calc(100% - 16px); transition: background .15s, color .15s; line-height: 1.3; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--rh-crimson); color: #fff; }
  .nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-item .nav-badge { margin-left: auto; background: rgba(255,255,255,0.18); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
  .nav-item.active .nav-badge { background: rgba(0,0,0,0.2); }
  .nav-divider { margin: 8px 16px; border: none; border-top: 1px solid rgba(255,255,255,0.07); }
  .nav-bottom { margin-top: auto; padding: 12px 8px; display: flex; flex-direction: column; gap: 1px; }
  .nav-bottom-btn { display: flex; align-items: center; gap: 9px; padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.45); font-size: 12px; font-weight: 500; font-family: inherit; text-align: left; width: 100%; transition: background .15s, color .15s; }
  .nav-bottom-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
  .nav-bottom-btn.danger:hover { background: rgba(174,30,35,0.35); color: #fca5a5; }
  .nav-bottom-btn .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .module-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  /* ─── HEADER RIGHT ─── */
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .save-indicator { color: var(--rh-teal); font-size: 12px; display: flex; align-items: center; gap: 5px; font-weight: 500; }
  .user-chip { color: rgba(255,255,255,0.7); font-size: 12px; display: flex; align-items: center; gap: 5px; }
  /* ─── LOGIN SCREEN ─── */
  .lock-screen { position: fixed; inset: 0; background: var(--rh-navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; gap: 24px; }
  .lock-logo { color: #fff; font-size: 30px; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }
  .lock-logo .lf-lead { color: #fff; font-weight: 300; }
  .lock-logo .lf-flow { color: var(--rh-crimson); font-weight: 700; }
  .lock-wordmark { color: rgba(255,255,255,0.45); font-size: 11px; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -18px; }
  .lock-card { background: #fff; border-radius: 12px; padding: 36px 40px; display: flex; flex-direction: column; align-items: center; gap: 18px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,.35); }
  .lock-card h2 { font-size: 18px; font-weight: 600; color: var(--rh-navy); }
  .lock-card p { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: -8px; line-height: 1.5; }
  /* ─── LOGIN FORM ─── */
  .login-form { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .login-form input { padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
  .login-form input:focus { border-color: var(--rh-crimson); box-shadow: 0 0 0 3px rgba(174,30,35,0.08); }
  .sign-in-btn { padding: 12px; background: var(--rh-crimson); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; width: 100%; }
  .sign-in-btn:hover:not(:disabled) { background: var(--rh-crimson-dark); }
  .sign-in-btn:disabled { opacity: .5; cursor: default; }
  .login-error { color: var(--rh-crimson); font-size: 13px; font-weight: 500; text-align: center; padding: 8px; background: var(--primary-light); border-radius: var(--radius); width: 100%; }
  /* ─── RESEARCH MODULE ─── */
  .score-circle { width: 32px; height: 32px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .signal-chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; background: #EBF0F7; color: #0E2841; white-space: nowrap; }
  .research-stat-bar { padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 24px; align-items: center; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  /* ─── USER MANAGEMENT ─── */
  .user-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--bg); border-radius: var(--radius); }
  .role-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
  .role-admin  { background: var(--primary-light); color: var(--rh-crimson); }
  .role-member { background: #EBF0F7; color: var(--rh-navy); }
  /* ─── MISC ─── */
  .export-pipedrive-btn { border-color: var(--rh-teal) !important; color: var(--rh-teal) !important; }
  .export-pipedrive-btn:hover { background: var(--rh-teal-light) !important; }
  .rh-rule { height: 2px; background: var(--rh-crimson); width: 40px; border-radius: 1px; }
  @media (max-width: 900px) { .side-panel { width: 100%; position: fixed; right: 0; top: 0; bottom: 0; z-index: 200; box-shadow: var(--shadow); } }
  /* ─── ANALYTICS ─── */
  .analytics-wrap { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:18px; }
  .analytics-grid { display:grid; gap:14px; }

const apiFetch = (url, method='GET', payload=null, token=null) => {
  const headers = {'Content-Type':'application/json'};
  if (token) headers['x-session-token'] = token;
  return fetch(url, {method, headers, body:payload?JSON.stringify(payload):null}).then(r=>r.json());
};

  const blob = new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),leads},null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`leadflow-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
}
function exportToPipedrive(leads) {
  const headers=['Lead Title','First Name','Last Name','Organization','Email','Phone','Lead Source','Expected Close Date','Lead Value Amount','Lead Value Currency','Owner Email','Note'];
  const rows=leads.map(l=>{
    const parts=(l.name||'').trim().split(' ');
    const note=[l.painPoint&&`Pain Point: ${l.painPoint}`,l.nextAction&&`Next Action: ${l.nextAction}`,l.serviceLine&&`Service Line: ${l.serviceLine}`,l.platform&&`Platform: ${l.platform}`].filter(Boolean).join('\n');

  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`pipedrive-leads-${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);

    apiFetch('/api/sso-config','GET',null,null).then(r => setSsoConfig(r)).catch(() => setSsoConfig({googleEnabled:false,microsoftEnabled:false}));
    const params = new URLSearchParams(window.location.search);
    const ssoErr = params.get('sso_error');
    if (ssoErr) { setError(ssoErr); window.history.replaceState({}, '', '/'); }
  }, []);

  const submit = async () => {
    if (!username.trim() || !password) return;
    setLoading(true); setError('');

      const d = await apiFetch('/api/login','POST',{username:username.trim(),password});
      if (d.ok) { onLogin(d.token, d.username, d.role); }
      else { setError(d.error||'Sign in failed'); setLoading(false); }
    } catch(e) { setError('Cannot connect to server. Make sure server.js is running.'); setLoading(false); }

                  Continue with Google

function HelpModal({onClose}) {
  const [tab, setTab] = useState('overview');
  const [search, setSearch] = useState('');

  const H = ({children}) => <div style={{fontSize:15,fontWeight:700,color:'var(--rh-navy)',marginBottom:6,marginTop:4}}>{children}</div>;
  const H2 = ({children}) => <div style={{fontWeight:700,fontSize:11,color:'var(--rh-crimson)',textTransform:'uppercase',letterSpacing:'0.09em',margin:'20px 0 8px'}}>{children}</div>;
  const P = ({children}) => <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.65,marginBottom:8}}>{children}</div>;
  const Step = ({n,children}) => (
    <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'9px 0',borderBottom:'1px solid var(--border)'}}>

      <div style={{fontSize:13,lineHeight:1.65}}>{children}</div>

  const Code = ({children}) => <code style={{display:'block',background:'#0E2841',color:'#99C8BB',padding:'9px 14px',borderRadius:5,fontSize:12,fontFamily:'Consolas,monospace',margin:'6px 0',wordBreak:'break-all'}}>{children}</code>;
  const Note = ({children}) => <div style={{background:'var(--rh-gold-light)',borderLeft:'3px solid var(--rh-gold)',borderRadius:'var(--radius)',padding:'9px 12px',fontSize:12,color:'#7a5800',lineHeight:1.6,margin:'8px 0'}}>{children}</div>;
  const Info = ({children}) => <div style={{background:'var(--rh-teal-light)',borderLeft:'3px solid var(--rh-teal)',borderRadius:'var(--radius)',padding:'9px 12px',fontSize:12,color:'#1a5c47',lineHeight:1.6,margin:'8px 0'}}>{children}</div>;
  const Row = ({icon,label,children}) => (
    <div style={{display:'grid',gridTemplateColumns:'22px auto 1fr',gap:'0 10px',alignItems:'start',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
      <span>{icon}</span><strong style={{color:'var(--rh-navy)',whiteSpace:'nowrap'}}>{label}</strong><span style={{color:'var(--text-muted)',lineHeight:1.55}}>{children}</span>
    </div>
  );

  const tabs = [
    {id:'overview',  label:'Overview'},
    {id:'dashboard', label:'Dashboard'},
    {id:'leads',     label:'Active Leads'},
    {id:'research',  label:'Research Intelligence'},
    {id:'ai',        label:'AI Research & Enrichment'},
    {id:'export',    label:'Pipedrive Export'},
    {id:'settings',  label:'Maintenance & Settings'},
    {id:'admin',     label:'Users & Remote Access'},
  ];

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:680,maxHeight:'90vh'}}>
        <div className="modal-header">
          <h2>❓ LeadFlow Help & Guide</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg)',flexShrink:0,overflowX:'auto'}}>
          {tabs.map(t=>(
            <div key={t.id} className={`panel-tab${tab===t.id?' active':''}`} style={{fontSize:11,padding:'10px 13px',whiteSpace:'nowrap'}} onClick={()=>setTab(t.id)}>{t.label}</div>
          ))}
        </div>
        <div className="modal-body" style={{gap:0}}>

          {/* ── OVERVIEW ── */}
          {tab==='overview'&&<>
            <H>Welcome to LeadFlow</H>
            <P>LeadFlow is Redhawk's internal business development tool — think of it as a private CRM built specifically for how Redhawk works. It lives on Blair's laptop (not in the cloud), so your data is completely under Redhawk's control. You access it through a web browser, just like any website, by going to the link Blair shares with you.</P>
            <P>The system has three jobs: <strong>(1)</strong> help you track and advance every sales opportunity through the pipeline, <strong>(2)</strong> automatically find new opportunities every night using AI so your pipeline is always growing, and <strong>(3)</strong> send a formatted report to Pipedrive every Wednesday so Redhawk's CRM stays current.</P>
            <H2>The Six Areas of LeadFlow</H2>
            <Row icon="📈" label="Dashboard">A scoreboard. Shows how the team is performing — open pipeline value, win rate, hot leads, overdue follow-ups. Each person sees their own numbers; Blair sees the full team view. Opens automatically when you log in.</Row>
            <Row icon="📊" label="Active Leads">The main workspace. Every company or person Redhawk is actively pursuing lives here. You move each lead through seven stages — from first identifying a target all the way to Won or Lost. This is where you spend most of your time.</Row>
            <Row icon="🔬" label="Contacts Research">A list of individual decision makers — real people at real companies — that the AI found overnight. Each person has been identified as a potential Redhawk prospect. You review the list and, when you find someone worth pursuing, promote them to Active Leads with one click.</Row>
            <Row icon="🏭" label="ERP Research">Same idea as Contacts Research, but focused on companies rather than individuals. The AI scans news every night looking for companies that are buying, replacing, or struggling with ERP systems — which is exactly when Redhawk can help.</Row>
            <Row icon="🎯" label="Company Research Intelligence">A targeted research module focused on specific companies and contacts that Redhawk has already identified as priority targets. Unlike ERP Research (which scans broadly), this module does deep-dive research on a curated list of names you provide in Maintenance. You add the target companies and contact names; the AI does nightly research specifically on those targets and surfaces findings here.</Row>
            <Row icon="⚙️" label="Maintenance">The settings area. You don't need to go here often, but it's where you manage team members, connect the AI services, set export recipients, and control the automated jobs.</Row>
            <H2>How Saving Works</H2>
            <P>You never need to click a Save button. Every change you make — editing a lead, adding a note, changing a stage — saves automatically within about one second. You'll see a brief <strong style={{color:'var(--rh-teal)'}}>✓ Saved</strong> flash in the header confirming it went through. If you don't see that flash, wait a moment and try again.</P>
            <H2>Where Your Data Lives</H2>
            <P>Everything is stored in a single database file on Blair's laptop — not in any cloud service. This means your data is private, there are no monthly fees, and nothing disappears if an external service shuts down. The tradeoff is that Blair's laptop needs to be on and running for others to access the system.</P>
          </>}

          {/* ── DASHBOARD ── */}
          {tab==='dashboard'&&<>
            <H>Dashboard — Your Performance Scoreboard</H>
            <P>The Dashboard is the first thing you see when you log in. Think of it as a scoreboard that answers the question: <em>"How are we actually doing right now?"</em> — without having to dig through every lead manually.</P>
            <P>When Blair (admin) logs in, the Dashboard opens to the <strong>Overall</strong> view showing the full team. When David or any other team member logs in, it opens directly to their own personal tab so they see their own numbers immediately. You can switch between any view by clicking the name tabs at the top of the Dashboard.</P>
            <H2>What the Numbers Mean</H2>
            <Row icon="💰" label="Pipeline Value">The total dollar value of everything currently in progress (not yet Won or Lost). This is the number that tells you how big the opportunity in front of the team is right now.</Row>
            <Row icon="📊" label="Open / Won / Lost">A simple count of where every lead stands. "Open" means still in progress. "Won" means closed successfully. "Lost" means the deal didn't happen.</Row>
            <Row icon="🔥" label="Hot Leads">Leads you've tagged as High Priority. The percentage shown tells you what fraction of your pipeline is actively being pursued. A low percentage may mean too much is sitting idle.</Row>
            <Row icon="⚠️" label="Overdue Follow-ups">Leads where you set a follow-up date and that date has now passed without action. These need attention today — a missed follow-up can cost a deal.</Row>
            <Row icon="🏆" label="Win Rate">Of all the deals you've closed (Won + Lost), what percentage did you win? This updates automatically as you mark leads Won or Lost.</Row>
            <Row icon="📈" label="Avg Deal Size">The average dollar value of your open leads. Helps you understand whether you're pursuing large or small deals on average.</Row>
            <H2>Charts — Understanding Your Pipeline at a Glance</H2>
            <P><strong>Pipeline by Stage</strong> — Shows how many leads and how much dollar value sit at each stage (Target, Outreach, Discovery, etc.). If most of your value is stuck at Proposal for weeks, that's a sign something needs to move.</P>
            <P><strong>Open Pipeline by Service Line</strong> — Breaks down your open pipeline by what Redhawk service is being sold (Business Transformation, AI & Integration, Cybersecurity, etc.). Useful for seeing where Redhawk's revenue is concentrated.</P>
            <P><strong>Team Workload</strong> — A table showing every team member's open lead count, hot leads, overdue follow-ups, and pipeline value side by side. Click any row to jump to that person's personal dashboard tab.</P>
            <P><strong>Top Opportunities</strong> — The 10 highest-value open leads in the system, ranked by dollar amount.</P>
            <H2>AI Research Spend Card</H2>
            <P>If Blair has set up the Anthropic API key (required for the nightly AI research), a card appears on the Overall Dashboard showing how much has been spent on AI research this month, how much budget remains, and the year-to-date total. The progress bar turns amber when 70% of the budget is used and red at 90%, so you can act before hitting the limit.</P>
            <H2>Personal Dashboards</H2>
            <P>Click any team member's name tab at the top to see their individual view — their own open leads, hot count, overdue alerts, win rate, and pipeline value. This lets Blair quickly check in on each person without asking them directly.</P>
          </>}

          {/* ── ACTIVE LEADS ── */}
          {tab==='leads'&&<>
            <H>Active Leads — Your Sales Pipeline</H>
            <P>Active Leads is where you manage every company or person Redhawk is actively trying to win business with. Every entry here is a real opportunity you're working — from the moment you first identify a target all the way to closing the deal.</P>
            <H2>The Seven Pipeline Stages</H2>
            <P>Every lead moves through stages in this order. You control when to advance a lead — the system never moves it automatically.</P>
            <Row icon="1️⃣" label="Target">You've identified a company worth pursuing but haven't reached out yet. This is the starting point for most leads.</Row>

            <Row icon="3️⃣" label="Discovery">They're engaged. You're in active conversations learning about their needs, pain points, and situation.</Row>
            <Row icon="4️⃣" label="Proposal">You've submitted a formal proposal or statement of work. The ball is in their court.</Row>
            <Row icon="5️⃣" label="Negotiation">They want to move forward but you're working through terms, pricing, or scope.</Row>
            <Row icon="6️⃣" label="Won">The deal is closed. Revenue is coming. Move here when a contract is signed.</Row>
            <Row icon="7️⃣" label="Lost">The deal didn't happen. Always move here rather than deleting — it keeps your win rate accurate and lets you learn from what didn't work.</Row>
            <H2>Adding a Lead Manually</H2>
            <Step n="1">Click <strong>+ Add Lead</strong> in the toolbar at the top of the Active Leads table.</Step>
            <Step n="2">Fill in what you know — at minimum a contact name. Add company, stage, service line, and any other details available. You can always fill in more later.</Step>
            <Step n="3">Click <strong>Add Lead</strong>. It appears in the table immediately and saves automatically.</Step>
            <Info><strong>Shortcut:</strong> Leads promoted from Research Intelligence arrive pre-filled — company, industry, service line, platform, labels, and the AI's research notes are all already there. You just add your own context on top.</Info>
            <H2>Working a Lead — The Side Panel</H2>
            <P>Click any row in the table to open the <strong>side panel</strong> on the right. This is where you do all your day-to-day work on a lead. You don't need to open a separate page — everything is in the panel.</P>
            <Row icon="▶" label="Advance Stage">The blue button at the top of the panel moves the lead to the next stage with one click. No dropdowns needed for the most common action.</Row>
            <Row icon="📝" label="Edit Any Field">Every detail is editable right in the panel — name, company, dollar value, expected close date, pain point, next action, follow-up date, labels, platform, industry. Click a field to edit it; changes save automatically.</Row>
            <Row icon="🗒" label="Notes">Add a timestamped note any time — after a call, a meeting, or any interaction. Notes are shown newest-first with your name and the date. Use these to build a conversation history so anyone on the team knows what's been said.</Row>
            <Row icon="✅" label="Activities">Log specific actions — calls, emails, meetings — with a due date. Check them off when done. This gives you a task list tied directly to each lead, so nothing falls through the cracks.</Row>
            <Row icon="📧" label="Outreach Scripts">LeadFlow generates a ready-to-use cold email and a phone call script for every lead, customized to that company's industry, the Redhawk service being pitched, their current platform, and their pain point. Click the Scripts tab inside the panel to see them. Copy and adjust as needed.</Row>
            <H2>Follow-Up Alerts — Never Miss a Callback</H2>
            <P>When you set a <strong>Follow-Up Date</strong> on any lead, LeadFlow watches that date. The moment the date arrives (or passes), a <strong>gold alert banner</strong> appears at the top of the Active Leads page listing every overdue lead by name. Click a name in the banner to jump directly to that lead's side panel. The banner disappears once all overdue follow-ups are cleared or rescheduled.</P>
            <H2>Filtering and Finding Leads</H2>
            <P>The toolbar has dropdowns to filter by stage, label, source, sector, or owner. Use these when you want to focus — for example, show only your hot leads at the Proposal stage, or see everything owned by a specific team member. Filters also control what gets exported to the Pipedrive CSV, so set your filter first if you want a targeted export. Click a column header to sort the table by that column.</P>
            <H2>Labels — Tagging for Context</H2>
            <P>Labels let you tag a lead with multiple attributes at once. There are four groups:</P>
            <P><strong>Priority:</strong> Hot (actively working), Warm (interested but not urgent), Cold (low activity) — used on the Dashboard to count hot leads and track urgency.<br/><strong>Sector:</strong> Commercial or Federal — identifies what kind of business this is.<br/><strong>Service Line:</strong> Which Redhawk capability is being sold — Business Transformation, AI & Integration, Cybersecurity, Digital Experience, or Applied AI.<br/><strong>Platform:</strong> What ERP or tech system the prospect is currently using — SAP, Oracle, Microsoft, Salesforce, etc. This is critical context for Redhawk's pitch.</P>
            <H2>Source Tracking — Where Did This Lead Come From?</H2>
            <P>Every lead automatically carries a <strong>Source</strong> tag showing how it entered the system: "Manual" if you added it yourself, or the research module name if it was promoted from AI research. This helps you measure over time which lead sources are producing the most wins.</P>
          </>}

          {/* ── RESEARCH ── */}
          {tab==='research'&&<>
            <H>Research Intelligence — Your Automated Prospect List</H>
            <P>Most CRMs expect you to find your own leads. LeadFlow does the prospecting for you. Every night while you sleep, the AI scans recent business news, identifies companies and individuals showing real buying signals for what Redhawk sells, scores each one, and adds them to these two modules. You come in the morning and your list has grown.</P>
            <P>There are three research modules accessible from the left nav: <strong>Contacts Research Intelligence</strong> finds individual decision makers (a VP of IT at a specific company, for example). <strong>Business/Technology Solutions Intelligence</strong> finds companies as a whole that are in the market for ERP modernization, AI transformation, or business process improvement. <strong>Company Research Intelligence</strong> does deep-dive research on a curated list of specific companies and contacts that you've added in Maintenance — think of it as targeted intelligence on accounts you're already tracking.</P>
            <H2>Understanding the Opportunity Score (1–10)</H2>
            <P>Every item the AI adds gets a score from 1 to 10 based on how strong the buying signals are. Think of it as the AI's confidence that this is worth your time:</P>
            <Row icon="🔴" label="8–10 (Hot)">Strong, specific signals — a company just issued an RFP, announced a major transformation project, or a key executive just joined from a competitor. Act on these first.</Row>
            <Row icon="🟡" label="6–7 (Warm)">Moderate signals — growth activity, hiring in relevant areas, or news suggesting change is coming. Worth monitoring and a soft outreach.</Row>
            <Row icon="🔵" label="1–5 (Cool)">Weaker signals. The AI found something relevant but the timing may not be right. Review periodically — circumstances change.</Row>
            <H2>Reading Each Row</H2>
            <Row icon="👤" label="Contact / Company">The name of the person (Contacts) or organization (ERP). If Apollo.io enrichment ran successfully, the contact's email, phone, and LinkedIn URL are also available in the side panel.</Row>
            <Row icon="⚡" label="Key Signals">Short tags summarizing why the AI flagged this item — e.g. "New RFP / Contract", "Leadership Change", "Growth / Hiring", "ERP Replacement". These come directly from the news articles the AI analyzed.</Row>
            <Row icon="🔧" label="Service Fit">The Redhawk service line the AI thinks is most relevant for this prospect, and the platform they're currently using. Helps you lead with the right message.</Row>
            <Row icon="👥" label="Owner / Assigned To">Who on the team owns this research item and who is assigned to follow up. Both are dropdown menus you can change at any time. Use Owner for accountability and Assigned To for the person doing the actual outreach.</Row>
            <Row icon="🏷" label="Status">Every item starts as <strong>New</strong>. Click <strong>Reviewed</strong> once you've read it. Click <strong>→ Promote</strong> when you're ready to pursue it actively. Promoted items move to Active Leads. You can also Archive items that aren't relevant.</Row>
            <H2>How to Work the Research List Each Morning</H2>
            <Step n="1">Filter by <strong>Status: New</strong> and <strong>Score: Hot (8–10)</strong> to see only fresh, high-priority items added overnight.</Step>
            <Step n="2">Read the Key Signals for each one. Click the row to open the side panel for full details including the AI's reasoning and any contact information.</Step>
            <Step n="3">If it looks worth pursuing, click <strong>→ Promote</strong>. The item is instantly added to Active Leads at the Target stage, pre-filled with everything the AI found. You take it from there.</Step>
            <Step n="4">If it's not relevant right now, click <strong>Reviewed</strong> to mark it read. It stays in the list but no longer shows as "New".</Step>
            <H2>Assigning Items to Team Members — Bulk Update</H2>
            <P>When new research comes in, you may want to assign batches of items to specific team members. The <strong>Bulk Update</strong> bar sits above the table. First, apply a filter to narrow down what you want to assign (for example, filter by industry or service line). Then select an Owner and/or Assigned To name in the Bulk Update bar and click <strong>Apply to All Visible</strong>. Only the items currently visible in the table are updated — items filtered out are not touched.</P>
            <H2>Filtering the Research Table</H2>
            <P>The dropdowns above the table let you filter by status, score tier, sector, service line, industry, platform, owner, and assigned-to. Use these together to slice the list — for example: show only Hot, unreviewed, Federal sector items assigned to you. The stat bar at the top shows how many items match your current filter vs. the total in the database. Click <strong>Clear ×</strong> to reset all filters at once.</P>
            <H2>Analytics Tab — Seeing the Big Picture</H2>
            <P>Each research module has a second tab labeled <strong>Analytics & Recommendations</strong>. It shows charts: how scores are distributed across the database, which industries have the most opportunities, which Redhawk service lines come up most often, and a ranked list of the top prospects by score. Use this to spot patterns — if 60% of your ERP research is in Manufacturing, that might inform where to focus outreach.</P>
          </>}

          {/* ── AI RESEARCH ── */}
          {tab==='ai'&&<>
            <H>AI Research & Contact Enrichment — How the Nightly Jobs Work</H>
            <P>This is the engine behind Research Intelligence. Once configured, it runs completely on its own — no one needs to do anything for new prospects to appear each morning. Understanding how it works helps you get the most out of it and troubleshoot if something looks off.</P>
            <H2>What Happens Every Night</H2>
            <P>Three separate jobs run automatically while the server is on:</P>
            <Row icon="🏭" label="2:00 AM — ERP Research">Finds companies with ERP buying signals. It searches for news about each ERP platform on your list (IFS, SAP, Microsoft D365, etc.) and identifies companies that are evaluating, replacing, or struggling with those systems — which is exactly when Redhawk can help.</Row>
            <Row icon="🔬" label="2:30 AM — Contacts Research">Finds individual decision makers. It looks for news about digital transformation, leadership changes, and executive hiring across industries, then identifies specific people who are likely to be the right contact for a Redhawk conversation.</Row>
            <Row icon="🎯" label="3:00 AM — Company Research">Does deep-dive research on the specific companies and contact names you've added in <strong>Maintenance → Companies/Names</strong>. Unlike the broad ERP and Contacts scans, this job is laser-focused — it pulls recent news on each named target and produces detailed intelligence specifically about them. If you haven't added any targets yet, this job skips automatically.</Row>
            <H2>Step-by-Step: What the AI Actually Does</H2>
            <Step n="1"><strong>Reads recent news.</strong> LeadFlow pulls fresh articles from Google News about ERP implementations, business transformation projects, and executive moves. This is the raw material the AI works from — real, current news rather than a static database.</Step>
            <Step n="2"><strong>Claude analyzes the news.</strong> The articles are sent to Claude (an Anthropic AI model) with instructions to identify every company or individual that shows genuine buying signals for Redhawk's services. Claude reads the articles, reasons about them, and returns a structured list with company names, why each one is relevant, which Redhawk service fits, and an opportunity score. There's no artificial limit on results — Claude returns as many as the evidence supports.</Step>
            <Step n="3"><strong>Apollo finds the real contact person.</strong> For each company Claude identifies, LeadFlow queries Apollo.io — a contact database — to find the actual decision maker: their verified name, email address, phone number, and LinkedIn profile URL. This turns a company name into a person you can reach.</Step>
            <Step n="4"><strong>Duplicates are skipped.</strong> LeadFlow checks whether the company or contact is already in the database. If it is, it's skipped. Only genuinely new discoveries are added, so the list doesn't fill up with repeats.</Step>
            <Step n="5"><strong>New items appear in Research Intelligence.</strong> Each newly added item shows up with status "New" and a badge count on the left nav so you know how many new items arrived overnight.</Step>
            <H2>Setting Up the API Keys (One-Time Setup)</H2>
            <P>Go to <strong>Maintenance → Research AI</strong> to enter these. Blair typically handles this setup.</P>
            <Row icon="🔑" label="Anthropic API Key">This is what powers the Claude AI analysis. Without it, neither research job can run. Get a key at <strong>console.anthropic.com</strong> — you create an account, add a payment method, and generate a key. The cost is very low: roughly $0.01–$0.05 per nightly run.</Row>
            <Row icon="🔑" label="Apollo.io API Key">This powers the contact enrichment step. Without it, you still get company names and AI-estimated contact titles, but you won't get verified emails, phone numbers, or LinkedIn URLs. Get a key at <strong>app.apollo.io → Settings → Integrations → API</strong>. Apollo has a free tier that covers typical usage.</Row>
            <Row icon="💰" label="Monthly Spend Limit">A safety cap on how much LeadFlow can spend on Anthropic API calls in a single calendar month. For example, set it to $10. Once that amount is reached, LeadFlow stops making AI calls until the next month starts. Leave it blank if you don't want a limit. The current spend is always visible on the Dashboard.</Row>
            <H2>Running Research Manually</H2>
            <P>You don't have to wait until 2 AM. In <strong>Maintenance → Research AI</strong>, there's a <strong>Run Now</strong> button under each research module. Click it to trigger a full research run immediately. This is useful when you first set up the system and want to populate the database right away, or after adding new ERP systems to your list. The status message updates in real time and the Last Run timestamp updates when it finishes.</P>
            <H2>Monitoring Spend</H2>
            <P>Every time the AI runs, LeadFlow records exactly how many tokens were used and what it cost. You can see this month's total, the amount remaining against your budget, and the year-to-date spend on the <strong>Dashboard → Overall</strong> tab in the AI Research Spend card. The progress bar turns amber at 70% and red at 90% as a warning before the limit is hit.</P>
            <Note><strong>If you don't have an Apollo key yet:</strong> The research still works — you'll get company names, industry, opportunity scores, and Claude's best guess at the right contact title. Apollo simply adds the verified person's actual contact details on top of that. You can add the Apollo key later and future runs will enrich new results automatically.</Note>
          </>}

          {/* ── EXPORT ── */}
          {tab==='export'&&<>
            <H>Pipedrive Export — Keeping Redhawk's CRM in Sync</H>
            <P>LeadFlow is Redhawk's working system — where the day-to-day BD activity happens. Pipedrive is the company-wide CRM. The export feature bridges the two: every Wednesday at 3:00 PM, LeadFlow automatically emails a file of all new and updated leads to whoever you designate. That file can be imported directly into Pipedrive in a few clicks.</P>
            <P>The key design decision here is <strong>incremental exports</strong>. LeadFlow doesn't send every lead every week — only leads that are new or have changed since the last export. This keeps Pipedrive imports clean and avoids creating duplicates.</P>
            <H2>Setting Up the Automatic Export</H2>
            <Step n="1">Go to <strong>Maintenance → Export Settings</strong>.</Step>
            <Step n="2">In the <strong>Export Email Recipients</strong> field, enter the email address (or addresses, separated by commas) that should receive the Wednesday export. This is typically the person responsible for maintaining Pipedrive.</Step>
            <Step n="3">Optionally enter a <strong>Sender Name</strong> — this appears in the email's signature line so the recipient knows who it's from. If you leave it blank it will say "LeadFlow · Redhawk Federal Solutions".</Step>
            <Step n="4">Save settings. From that point on, every Wednesday at 3:00 PM LeadFlow generates the CSV automatically and emails it. You don't need to do anything.</Step>
            <Note><strong>Technical requirement:</strong> Microsoft Outlook must be installed and signed in on the laptop running LeadFlow. LeadFlow uses Outlook to send the email, so if Outlook isn't open or signed in, the automatic email won't go out — though you can still do a manual download export.</Note>
            <H2>Running an Export Manually</H2>
            <P>You don't have to wait for Wednesday. There are two ways to trigger an export immediately:</P>
            <Row icon="📤" label="From Active Leads">Click <strong>Export Changes</strong> in the toolbar at the top of the Active Leads table. This downloads the CSV file directly to your browser — no email is sent.</Row>
            <Row icon="📤" label="From Maintenance">Go to <strong>Maintenance → Export Settings</strong> and click <strong>Export Changes Now</strong>. Same result — immediate download to your browser.</Row>
            <P>After a manual export, the timestamp resets. The next automatic Wednesday export (and any future manual export) will only include leads changed <em>after</em> this manual run.</P>
            <H2>What's in the Export File</H2>
            <P>The file is a CSV (a spreadsheet-compatible format) formatted exactly the way Pipedrive expects it for importing leads. Each row is one lead and includes: the contact's name and organization, their email and phone, the lead source, expected close date, dollar value, and a notes field containing the pain point, next action, Redhawk service line, platform, and which module the lead came from.</P>
            <H2>Importing the File into Pipedrive</H2>
            <Step n="1">Open Pipedrive and go to <strong>Leads</strong> in the left nav.</Step>
            <Step n="2">Click the <strong>⋮ menu</strong> (three dots) in the top-right of the Leads view and select <strong>Import data</strong>.</Step>
            <Step n="3">Choose <strong>From a spreadsheet</strong> and upload the CSV file you received by email or downloaded.</Step>
            <Step n="4">Pipedrive will automatically match the column headers to its own fields. Review the mapping, then confirm the import.</Step>
            <H2>Checking When the Last Export Ran</H2>
            <P>The <strong>Last Export</strong> timestamp in Maintenance → Export Settings shows the exact date and time of the most recent export. Any lead created or edited after that timestamp will be included in the next export. If the timestamp is blank, no export has run yet — all leads will be included in the first one.</P>
          </>}

            <div style={{display:'flex',flexDirection:'column',gap:10,margin:'4px 0 14px'}}>

            <H2>Remote Access — Letting Colleagues In from Anywhere</H2>
            <P>LeadFlow runs on Blair's laptop, not a cloud server. This is great for privacy and cost, but it means teammates in other locations can't access it without a way to reach Blair's machine over the internet. <strong>Cloudflare Tunnel</strong> solves this — it's a free tool that creates a secure, encrypted link from the internet directly to LeadFlow on the laptop, with no IT involvement or firewall changes needed.</P>
            <P>Think of it like temporarily giving your laptop a public web address that anyone can visit. The connection is fully encrypted (HTTPS), just like any major website. When you close the tunnel, the address disappears.</P>
            <H2>Setting Up Remote Access — Step by Step</H2>
            <Step n="1"><strong>Install Cloudflare Tunnel (one time only).</strong> Open PowerShell on Blair's laptop and run the command below. This installs the tunnel software. You only need to do this once ever.<Code>winget install --id Cloudflare.cloudflared</Code></Step>
            <Step n="2"><strong>Make sure LeadFlow is running.</strong> The server needs to be running before you open the tunnel. If it's not running, start it first — check the Claude Code preview panel or restart it there.</Step>
            <Step n="3"><strong>Open a tunnel.</strong> Open a new PowerShell window and run:<Code>cloudflared tunnel --url http://localhost:3031</Code>Wait about 10 seconds. You'll see a line appear that looks like:<Code>https://some-random-words-123.trycloudflare.com</Code>That is your live URL. Copy it.</Step>
            <Step n="4"><strong>Share it with your colleagues.</strong> Send them the URL and their LeadFlow username and password. They open the URL in any web browser (Chrome, Edge, Safari — anything works) and log in normally. They'll see the same LeadFlow interface you see.</Step>
            <Info><strong>The URL is active the moment it appears.</strong> You don't need to do anything else. The connection is encrypted end-to-end — colleagues are accessing a secured HTTPS link, not raw traffic.</Info>
            <Note><strong>The URL changes every session.</strong> Each time you run the tunnel command you get a different URL. Just send the new one to your colleagues — it only takes a second. If you want a permanent, unchanging URL, set up a free named tunnel at cloudflare.com (ask Blair or Claude Code for help with that).<br/><br/><strong>Keep the PowerShell window open</strong> the entire time colleagues need access. Closing it immediately ends the tunnel and cuts off everyone. Blair's laptop must also stay awake (disable sleep mode while tunneling).</Note>

            <H2>Your Data & How to Back It Up</H2>
            <P>All of LeadFlow's data — every lead, note, research item, user account, and setting — is stored in a single file called <strong>leadflow.db</strong> located at:</P>
            <Code>C:\Users\BlairBass\Claude Leads\leadflow.db</Code>
            <P>To back it up, simply copy that file to OneDrive, SharePoint, a USB drive, or anywhere else safe. Do this periodically — weekly is a reasonable habit. To restore from a backup, replace the file with the backup copy and restart the LeadFlow server.</P>
            <Info><strong>Passwords are secure.</strong> User passwords are never stored as plain text — they're run through a one-way encryption process (SHA-256 with a random salt) before being saved. Even if someone accessed the database file directly, they could not read anyone's password. Sessions stay active for 30 days and survive server restarts, so you won't be logged out just because the server was restarted.</Info>
          </>}

        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}

// ─── USER MANAGEMENT MODAL ────────────────────────────────────────────────────
function UserManagementModal({token, currentUser, onClose}) {
  const [users, setUsers]   = useState([]);
  const [tab, setTab]       = useState(currentUser.role==='admin'?'users':'password');
  const [newUser, setNewUser] = useState({username:'',password:'',role:'member'});
  const [pwd, setPwd]       = useState({current:'',next:'',confirm:''});
  const [msg, setMsg]       = useState({text:'',ok:true});

  useEffect(()=>{ if(currentUser.role==='admin') apiFetch('/api/users','GET',null,token).then(d=>{ if(d.ok) setUsers(d.users); }); },[token]);

  const flash = (text,ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg({text:'',ok:true}),3000); };

  const addUser = async () => {
    if(!newUser.username.trim()||!newUser.password) return;
    const d=await apiFetch('/api/users','POST',newUser,token);
    if(d.ok){ setUsers(u=>[...u,{username:newUser.username.trim(),role:newUser.role,createdAt:new Date().toISOString()}]); setNewUser({username:'',password:'',role:'member'}); flash('User added successfully.'); }
    else flash(d.error||'Failed to add user',false);
  };
  const removeUser = async (username) => {
    if(!confirm(`Remove user "${username}"? They will no longer be able to sign in.`)) return;
    const d=await apiFetch('/api/users','DELETE',{username},token);
    if(d.ok) setUsers(u=>u.filter(x=>x.username!==username)); else flash(d.error||'Failed',false);
  };
  const changePassword = async () => {
    if(pwd.next!==pwd.confirm){ flash('New passwords do not match',false); return; }
    if(pwd.next.length<4){ flash('Password must be at least 4 characters',false); return; }
    const d=await apiFetch('/api/change-password','POST',{currentPassword:pwd.current,newPassword:pwd.next},token);
    if(d.ok){ flash('Password changed successfully.'); setPwd({current:'',next:'',confirm:''}); }
    else flash(d.error||'Failed',false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:500}}>
        <div className="modal-header"><h2>👥 Account & Users</h2><button className="modal-close" onClick={onClose}>×</button></div>
        <div style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
          {currentUser.role==='admin'&&<div className={`panel-tab${tab==='users'?' active':''}`} onClick={()=>setTab('users')}>Users</div>}
          <div className={`panel-tab${tab==='password'?' active':''}`} onClick={()=>setTab('password')}>Change Password</div>
        </div>
        <div className="modal-body">
          {msg.text&&<div style={{padding:'8px 12px',borderRadius:'var(--radius)',fontSize:13,fontWeight:500,background:msg.ok?'#f0fdf4':'var(--primary-light)',color:msg.ok?'var(--success)':'var(--danger)'}}>{msg.text}</div>}

          {tab==='users'&&currentUser.role==='admin'&&<>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {users.map(u=>(
                <div key={u.username} className="user-row">
                  <span style={{fontWeight:600,fontSize:13,flex:1}}>{u.username}</span>
                  <span className={`role-badge ${u.role==='admin'?'role-admin':'role-member'}`}>{u.role}</span>
                  {u.username===currentUser.username
                    ? <span style={{fontSize:11,color:'var(--text-muted)'}}>you</span>
                    : <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',borderColor:'var(--danger)'}} onClick={()=>removeUser(u.username)}>Remove</button>}
                </div>
              ))}
              {users.length===0&&<div style={{color:'var(--text-muted)',fontSize:13}}>No users yet.</div>}
            </div>
            <div style={{padding:16,background:'var(--bg)',borderRadius:'var(--radius)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--rh-crimson)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Add New User</div>
              <div className="form-row">
                <div className="form-group"><label>USERNAME</label><input placeholder="jsmith" value={newUser.username} onChange={e=>setNewUser(n=>({...n,username:e.target.value}))} /></div>
                <div className="form-group"><label>ROLE</label><select value={newUser.role} onChange={e=>setNewUser(n=>({...n,role:e.target.value}))}><option value="member">Member</option><option value="admin">Admin</option></select></div>
              </div>
              <div className="form-group" style={{marginTop:10}}><label>TEMPORARY PASSWORD</label><input type="password" placeholder="They can change after first login" value={newUser.password} onChange={e=>setNewUser(n=>({...n,password:e.target.value}))} /></div>
              <button className="btn btn-primary btn-sm" style={{marginTop:10}} disabled={!newUser.username.trim()||!newUser.password} onClick={addUser}>Add User</button>
            </div>
          </>}

          {tab==='password'&&<>
            <div style={{fontSize:13,color:'var(--text-muted)'}}>Changing password for: <strong style={{color:'var(--text)'}}>{currentUser.username}</strong></div>
            <div className="form-group"><label>CURRENT PASSWORD</label><input type="password" value={pwd.current} onChange={e=>setPwd(p=>({...p,current:e.target.value}))} autoFocus /></div>
            <div className="form-group"><label>NEW PASSWORD</label><input type="password" value={pwd.next} onChange={e=>setPwd(p=>({...p,next:e.target.value}))} /></div>
            <div className="form-group"><label>CONFIRM NEW PASSWORD</label><input type="password" value={pwd.confirm} onChange={e=>setPwd(p=>({...p,confirm:e.target.value}))} /></div>
            <button className="btn btn-primary btn-sm" disabled={!pwd.current||!pwd.next||!pwd.confirm} onClick={changePassword}>Change Password</button>
          </>}
        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}
