            <button className="btn btn-primary btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>setShowActModal(true)}>+ Log Activity</button>
            {lead.activities.length===0?<div className="empty" style={{padding:'30px 0'}}><div className="empty-icon">📋</div><span>No activities logged</span></div>:
              lead.activities.slice().reverse().map(a=>(
                <div key={a.id} className="activity-card">
                  <div className="activity-icon">{actIcon(a.type)}</div>
                  <div className="activity-content">
                    <div className={`activity-subject${a.done?' activity-done':''}`}>{a.subject}</div>
                    {a.note&&<div className="activity-meta">{a.note}</div>}
                    <div className="activity-meta" style={{marginTop:4}}>
                      {a.dueDate?`Scheduled: ${fmtDate(a.dueDate)}`:fmtDate(a.createdAt)}
                      {' · '}<label style={{cursor:'pointer'}}><input type="checkbox" checked={a.done} onChange={()=>toggleAct(a.id)} style={{marginRight:4}}/>Done</label>
                      {' · '}<button style={{background:'none',border:'none',cursor:'pointer',color:'var(--danger)',fontSize:12,padding:0}} onClick={()=>delAct(a.id)}>Remove</button>
                    </div>
                  </div>
                </div>
              ))
            }
          </>)}
        </div>
      </div>
      {showActModal&&<ActivityModal onSave={addActivity} onClose={()=>setShowActModal(false)}/>}
      {showEditModal&&<LeadModal lead={lead} onSave={u=>{onUpdate({...lead,...u});setShowEditModal(false);}} onClose={()=>setShowEditModal(false)}/>}
      {showScript&&<ScriptModal lead={lead} onClose={()=>setShowScript(false)}/>}
    </>
  );
}

// ─── ANALYTICS TAB ───────────────────────────────────────────────────────────
function AnalyticsTab({items, teamMembers}) {
  const active   = items.filter(i => i.status !== 'Archived');
  const hot      = active.filter(i => i.opportunityScore >= 8);
  const warm     = active.filter(i => i.opportunityScore >= 6 && i.opportunityScore <= 7);
  const top5     = [...active].filter(i=>i.status!=='Promoted').sort((a,b)=>b.opportunityScore-a.opportunityScore).slice(0,5);

  const tally = (arr, key) => { const m={}; arr.forEach(i=>{ const v=i[key]||'Unknown'; m[v]=(m[v]||0)+1; }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const topIndustries = tally(active,'industry').slice(0,6);
  const topSvc        = tally(active,'recommendedServiceLine');
  const topAssigned   = tally(active,'assignedTo').slice(0,8);

  const signalCounts = {};
  active.forEach(i=>(i.signals||[]).forEach(s=>signalCounts[s]=(signalCounts[s]||0)+1));
  const topSignals = Object.entries(signalCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const lcItems = active.filter(i=>(i.signals||[]).some(s=>s.toLowerCase().includes('leadership')||s.toLowerCase().includes('new role')));
  const rfpItems = active.filter(i=>(i.signals||[]).some(s=>s.toLowerCase().includes('rfp')||s.toLowerCase().includes('contract')));

  const scoreColor = s => s>=8?'var(--rh-crimson)':s>=6?'var(--rh-gold)':s>=4?'var(--rh-teal)':'#9ca3af';
  const total = active.length || 1;

  const BarRow = ({label, count, tot, color}) => (
    <div className="bar-row">
      <span className="bar-label" title={label}>{label}</span>
      <div className="bar-track"><div className="bar-fill" style={{width:`${Math.round(count/(tot||1)*100)}%`,background:color}}/></div>
      <span className="bar-count">{count}</span>
    </div>
  );

  const urgency = item => {
    const s = (item.signals||[]).map(x=>x.toLowerCase()).join(' ');
    if(s.includes('leadership')||s.includes('new role')) return {text:'New leadership detected — contact within 7 days', cls:'fu-overdue'};
    if(s.includes('rfp')||s.includes('contract'))        return {text:'Active RFP signal — reach out immediately',        cls:'fu-overdue'};
    if(s.includes('funding')||s.includes('m&a'))         return {text:'M&A / funding event — 30–60 day window',          cls:'fu-today'};
    if(s.includes('tech refresh'))                       return {text:'Tech refresh cycle — reach out within 2 weeks',   cls:'fu-today'};
    return {text:'Strong ICP fit — schedule next outreach cycle', cls:'fu-soon'};
  };

  const action = item => {
    if((item.connectionStrength||'').startsWith('Strong')) return 'Call directly — skip the intro, you have the relationship.';
    if((item.connectionStrength||'').startsWith('Warm'))   return 'Request a warm intro from your mutual contact first.';
    return 'LinkedIn connection request with a note referencing their specific trigger signal.';
  };

  const recs = [
    lcItems.length>0 && {
      title: `Act on ${lcItems.length} leadership change${lcItems.length>1?'s':''} this week`,
      body:  `New leaders evaluate and change vendors within their first 90 days. ${lcItems.slice(0,2).map(i=>i.contactName).join(' and ')}${lcItems.length>2?` (+${lcItems.length-2} more)`:''} just changed roles. These contacts jump to the top of your call list regardless of score.`,
    },
    rfpItems.length>0 && {
      title: `${rfpItems.length} active RFP signal${rfpItems.length>1?'s':''} — respond before the window closes`,
      body:  `An RFP signal means the budget conversation is already happening. ${rfpItems.slice(0,2).map(i=>`${i.contactName} at ${i.company}`).join(', ')} should receive outreach today. Late entries rarely win; early relationships define the vendor shortlist.`,
    },
    topSvc[0] && {
      title: `Lead with ${topSvc[0][0]} — it's your strongest theme (${Math.round(topSvc[0][1]/total*100)}% of pipeline)`,
      body:  `${topSvc[0][1]} of ${active.length} prospects align to ${topSvc[0][0]}. Build a single sharp pitch deck and proof point around this service line. A tailored vertical message converts 2–3× better than a generic capabilities overview.`,
    },
    topIndustries[0] && {
      title: `${topIndustries[0][0]} is your dominant vertical — find a reference win`,
      body:  `${topIndustries[0][1]} prospects (${Math.round(topIndustries[0][1]/total*100)}%) are in ${topIndustries[0][0]}. If Redhawk has any project wins or case studies in this sector, make them the opening line of every outreach. Nothing opens a VP's door faster than "we did this for a company just like yours."`,
    },
    warm.length>3 && {
      title: `Nurture ${warm.length} warm leads with content — don't let them go cold`,
      body:  `Your ${warm.length} warm leads (score 6–7) aren't ready for a direct pitch but too valuable to ignore. A monthly insight email, a LinkedIn comment on their post, or forwarding a relevant industry article keeps Redhawk top-of-mind until their need crystallizes — often at the start of a new budget cycle.`,
    },
    hot.length>5 && {
      title: `Distribute hot leads across the team — ${hot.length} is too many for one person`,
      body:  `You have ${hot.length} hot leads. Best practice is 5–7 personalized outreach touches per week per rep. Assigning the excess to David, JB, or Greg ensures none go stale. Use the "Assigned To" column to distribute and track ownership.`,
    },
  ].filter(Boolean);

  if(active.length===0) return <div className="empty"><div className="empty-icon">📊</div><strong>No data yet</strong><span>Import research items to see analytics.</span></div>;

  return (
    <div className="analytics-wrap">
      {/* KPI row */}
      <div className="analytics-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        {[
          {label:'Total Prospects', value:active.length, sub:'in database',         color:'var(--rh-navy)'},
          {label:'Hot Leads',       value:hot.length,    sub:'score 8–10',           color:'var(--rh-crimson)'},
          {label:'Warm Leads',      value:warm.length,   sub:'score 6–7, ready to nurture', color:'var(--rh-gold)'},
          {label:'Promoted',        value:items.filter(i=>i.status==='Promoted').length, sub:'moved to Active Leads', color:'var(--success)'},
        ].map(s=>(
          <div key={s.label} className="analytics-card stat-chip" style={{borderTopColor:s.color}}>
            <div style={{fontSize:34,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginTop:6}}>{s.label}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Charts */}
      <div className="analytics-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="analytics-card">
          <h3>Industry Breakdown</h3>
          {topIndustries.map(([ind,ct])=><BarRow key={ind} label={ind} count={ct} tot={total} color="var(--rh-navy)"/>)}
        </div>
        <div className="analytics-card">
          <h3>Service Line Demand</h3>
          {topSvc.map(([svc,ct])=><BarRow key={svc} label={svc} count={ct} tot={total} color="var(--rh-crimson)"/>)}
        </div>
      </div>
      <div className="analytics-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="analytics-card">
          <h3>Top Trigger Signals</h3>
          {topSignals.length>0 ? topSignals.map(([sig,ct])=><BarRow key={sig} label={sig} count={ct} tot={Object.values(signalCounts).reduce((a,b)=>a+b,0)} color="var(--rh-gold)"/>) : <div style={{color:'var(--text-muted)',fontSize:12}}>No signals recorded.</div>}
        </div>
        <div className="analytics-card">
          <h3>Assigned To — Workload</h3>
          {topAssigned.map(([name,ct])=><BarRow key={name} label={name} count={ct} tot={total} color="var(--rh-teal)"/>)}
        </div>
      </div>

      {/* Top Opportunities */}
      <div className="analytics-card">
        <h3>Top Opportunities — Expert Analysis</h3>
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14}}>Ranked by opportunity score · urgency flags based on live signals</div>
        {top5.length===0 && <div style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic'}}>All active items have been promoted to Active Leads.</div>}
        {top5.map((item)=>{
          const urg = urgency(item);
          return (
            <div key={item.id} className="opp-card" style={{borderLeft:`3px solid ${scoreColor(item.opportunityScore)}`}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                <div style={{fontSize:24,fontWeight:700,color:scoreColor(item.opportunityScore),width:32,textAlign:'center',flexShrink:0,lineHeight:1,marginTop:2}}>{item.opportunityScore}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:14,color:'var(--rh-navy)'}}>{item.contactName}</span>
                    <span style={{color:'var(--text-muted)',fontSize:12}}>— {item.company}</span>
                    {(item.signals||[]).slice(0,2).map(s=><span key={s} className="signal-chip">{s}</span>)}
                  </div>
                  <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>{item.title} · {item.recommendedServiceLine}{item.currentPlatform?' · '+item.currentPlatform:''}</div>
                  {item.painPoints&&<div style={{fontSize:12,color:'var(--text)',lineHeight:1.55,background:'var(--bg)',padding:'7px 10px',borderRadius:'var(--radius)',marginBottom:7}}>{item.painPoints}</div>}
                  <div className={`fu-panel-alert ${urg.cls}`} style={{fontSize:12,padding:'5px 10px',marginBottom:5}}>⚡ {urg.text}</div>
                  <div style={{fontSize:12,color:'var(--text)',fontStyle:'italic'}}>→ {action(item)}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Strategic Recommendations */}
      <div className="analytics-card" style={{marginBottom:8}}>
        <h3>Strategic Recommendations</h3>
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:14,lineHeight:1.5}}>Based on current pipeline composition — generated from live data. Updated each time you view this tab.</div>
        {recs.length===0 && <div style={{color:'var(--text-muted)',fontSize:13,fontStyle:'italic'}}>Add more research items to generate recommendations.</div>}
        {recs.map((rec,i)=>(
          <div key={i} className="rec-item">
            <div className="rec-num">{i+1}</div>
            <div>
              <div style={{fontWeight:600,fontSize:13,color:'var(--rh-navy)',marginBottom:4}}>{rec.title}</div>
              <div style={{fontSize:12,color:'var(--text)',lineHeight:1.65}}>{rec.body}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── RESEARCH MODULE ──────────────────────────────────────────────────────────
function ResearchModule({items, setItems, onPromote, teamMembers, moduleLabel='Contacts Research Intelligence', sourceModuleTag='Contacts Research Intelligence', erpSystems=[]}) {
  const [moduleTab, setModuleTab]       = useState('prospects'); // 'prospects' | 'analytics'
  const [selected, setSelected]         = useState(null);
  const [search, setSearch]             = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterSector, setFilterSector] = useState('');
  const [filterService, setFilterService] = useState('');
  const [filterScore, setFilterScore]   = useState('');
  const [filterIndustry, setFilterIndustry] = useState('');
  const [filterPlatform, setFilterPlatform] = useState('');
  const [filterOwner, setFilterOwner]   = useState('');
  const [filterAssigned, setFilterAssigned] = useState('');
  const [filterGeo, setFilterGeo] = useState('');
  const [sort, setSort] = useState({key:'opportunityScore', dir:'desc'});
  const importRef = useRef(null);

  const scoreColor = s => s>=8?'var(--rh-crimson)':s>=6?'var(--rh-gold)':s>=4?'var(--rh-teal)':'#9ca3af';
  const statusCls  = s => s==='Promoted'?'stage-won':s==='Archived'?'stage-lost':s==='Reviewed'?'stage-discovery':'stage-outreach';
  const toggleSort = key => setSort(s => s.key===key ? {key, dir:s.dir==='asc'?'desc':'asc'} : {key, dir: key==='opportunityScore'?'desc':'asc'});
  const SortIcon   = ({k}) => <span className={`sort-icon${sort.key===k?' sort-active':''}`}>{sort.key===k?(sort.dir==='asc'?'▲':'▼'):'⇅'}</span>;

  const [bulkOwner,   setBulkOwner]   = useState('');
  const [bulkAssigned,setBulkAssigned]= useState('');
  const archiveItem  = id => setItems(is=>is.map(i=>i.id===id?{...i,status:'Archived'}:i));
  const reviewItem   = id => setItems(is=>is.map(i=>i.id===id?{...i,status:'Reviewed'}:i));
  const setOwnerVal  = (id, val) => { setItems(is=>is.map(i=>i.id===id?{...i,owner:val}:i));    setSelected(s=>s?.id===id?{...s,owner:val}:s); };
  const setAssigned  = (id, val) => { setItems(is=>is.map(i=>i.id===id?{...i,assignedTo:val}:i)); setSelected(s=>s?.id===id?{...s,assignedTo:val}:s); };
  const applyBulk = () => {
    if (!bulkOwner && !bulkAssigned) return;
    const ids = new Set(visible.map(i=>i.id));
    setItems(is=>is.map(i=>ids.has(i.id)?{...i,...(bulkOwner?{owner:bulkOwner}:{}),...(bulkAssigned?{assignedTo:bulkAssigned}:{})}:i));
    setSelected(s=>s&&ids.has(s.id)?{...s,...(bulkOwner?{owner:bulkOwner}:{}),...(bulkAssigned?{assignedTo:bulkAssigned}:{})}:s);
  };

  const handlePromote = item => {
    const svcMap={'Business Transformation':'svc-transform','AI & Integration (CDX)':'svc-ai','Applied AI & Automation':'svc-data','Digital Experience':'svc-digital','Cybersecurity / Zero-Trust':'svc-cyber'};
    const lead = {
      id:uid(), name:item.contactName, org:item.company, email:'', phone:'', linkedIn:item.linkedInUrl||'',
      stage:'Target', source:'LinkedIn', sector:item.sector, value:null,
      serviceLine:item.recommendedServiceLine, platform:item.currentPlatform,
      industry:item.industry, companySize:item.companySize, painPoint:item.painPoints,
      connectionStrength:'Cold — no prior contact', nextAction:'', followUpDate:'', closeDate:'',
      labels:[item.sector==='Federal'?'federal':'commercial', item.opportunityScore>=8?'hot':item.opportunityScore>=6?'warm':'cold', svcMap[item.recommendedServiceLine]||''].filter(Boolean),
      notes:item.notes?[{id:uid(),text:'Research Notes:\n'+item.notes,createdAt:now()}]:[],
      activities:[], createdAt:now(), updatedAt:now(), lastActivity:null, sourceModule:sourceModuleTag,
    };
    setItems(is=>is.map(i=>i.id===item.id?{...i,status:'Promoted',promotedLeadId:lead.id}:i));
    onPromote(lead);
    setSelected(null);
    alert(`✓ ${item.contactName} moved to Active Leads. Switch to the Active Leads tab to continue.`);
  };

  const handleImportJson = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ try {
      const data=JSON.parse(ev.target.result);
      const incoming=Array.isArray(data)?data:(data.items||data.research||data.findings||[]);
      if(!incoming.length) throw new Error('empty');
      const existingIds=new Set(items.map(i=>i.id));
      const fresh=incoming.map(i=>({source:'Claude Research',status:'New',owner:'Blair',assignedTo:'Blair',...i,id:i.id&&!existingIds.has(i.id)?i.id:uid()})).filter(i=>!existingIds.has(i.id));
      setItems(is=>[...fresh,...is]);
      alert(`Imported ${fresh.length} new research item${fresh.length!==1?'s':''}.`);
    } catch { alert('Import failed — expected a JSON file with an array of research items.'); }};
    reader.readAsText(file); e.target.value='';
  };

  const hasFilters = filterStatus||filterSector||filterService||filterScore||filterIndustry||filterPlatform||filterOwner||filterAssigned||filterGeo;
  const clearFilters = () => { setFilterStatus('');setFilterSector('');setFilterService('');setFilterScore('');setFilterIndustry('');setFilterPlatform('');setFilterOwner('');setFilterAssigned(''); };

  const visible = useMemo(()=>{
    let out = items;
    if(search.trim()){const q=search.toLowerCase();out=out.filter(i=>(i.contactName||'').toLowerCase().includes(q)||(i.company||'').toLowerCase().includes(q)||(i.title||'').toLowerCase().includes(q)||(i.painPoints||'').toLowerCase().includes(q));}
    if(filterStatus)   out=out.filter(i=>i.status===filterStatus);
    if(filterSector)   out=out.filter(i=>i.sector===filterSector);
    if(filterGeo==='US') out=out.filter(i=>!i.geography||i.geography==='US');
    if(filterGeo==='International') out=out.filter(i=>i.geography&&i.geography!=='US');
    if(filterService)  out=out.filter(i=>i.recommendedServiceLine===filterService);
    if(filterIndustry) out=out.filter(i=>i.industry===filterIndustry);
    if(filterPlatform) out=out.filter(i=>i.currentPlatform===filterPlatform);
    if(filterOwner)    out=out.filter(i=>(i.owner||'')===filterOwner);
    if(filterAssigned) out=out.filter(i=>(i.assignedTo||'')===filterAssigned);
    if(filterScore==='hot')  out=out.filter(i=>i.opportunityScore>=8);
    if(filterScore==='warm') out=out.filter(i=>i.opportunityScore>=6&&i.opportunityScore<=7);
    if(filterScore==='cool') out=out.filter(i=>i.opportunityScore<=5);
    return [...out].sort((a,b)=>{
      let av=a[sort.key], bv=b[sort.key];
      const nil=sort.dir==='asc'?'￿':'';
      if(av==null||av==='') av=nil; if(bv==null||bv==='') bv=nil;
      if(typeof av==='number'&&typeof bv==='number') return sort.dir==='asc'?av-bv:bv-av;
      return sort.dir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
  },[items,search,filterStatus,filterSector,filterService,filterScore,filterIndustry,filterPlatform,filterOwner,filterAssigned,filterGeo,sort]);

  const counts = useMemo(()=>({
    total:items.length,
    newCount:items.filter(i=>i.status==='New').length,
    hot:items.filter(i=>i.opportunityScore>=8&&i.status!=='Archived'&&i.status!=='Promoted').length,
    promoted:items.filter(i=>i.status==='Promoted').length,
  }),[items]);

  // Unique values for dynamic filter dropdowns
  const uniqIndustries = useMemo(()=>[...new Set(items.map(i=>i.industry).filter(Boolean))].sort(),[items]);
  const uniqPlatforms  = useMemo(()=>[...new Set(items.map(i=>i.currentPlatform).filter(Boolean))].sort(),[items]);

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
      {/* ── Toolbar row 1: search + actions ── */}
      <div className="toolbar" style={{gap:8,flexWrap:'wrap'}}>
        <div className="search-wrap"><span className="search-icon">🔍</span><input placeholder="Search name, company, title, pain points…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="spacer"/>
        <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportJson}/>
        <button className="btn btn-ghost btn-sm" onClick={()=>importRef.current.click()} title="Load research.json from nightly Claude research session">⬆ Import Research</button>
        <button className="btn btn-ghost btn-sm" style={{opacity:.45,cursor:'not-allowed'}} title="Automated nightly research — coming soon">🔬 Run Research</button>
      </div>
      {/* ── Toolbar row 2: filters ── */}
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 16px',background:'var(--surface)',borderBottom:'1px solid var(--border)',flexWrap:'wrap',flexShrink:0}}>
        <select className="select-sm" value={filterStatus}   onChange={e=>setFilterStatus(e.target.value)}><option value="">All Statuses</option>{RESEARCH_STATUSES.map(s=><option key={s}>{s}</option>)}</select>
        <select className="select-sm" value={filterSector}   onChange={e=>setFilterSector(e.target.value)}><option value="">All Sectors</option><option>Commercial</option><option>Federal</option></select>
        <select className="select-sm" value={filterScore}    onChange={e=>setFilterScore(e.target.value)}><option value="">All Scores</option><option value="hot">Hot (8–10)</option><option value="warm">Warm (6–7)</option><option value="cool">Cool (1–5)</option></select>
        <select className="select-sm" value={filterGeo}      onChange={e=>setFilterGeo(e.target.value)}><option value="">All Geographies</option><option value="US">🇺🇸 US</option><option value="International">🌐 International</option></select>
        <select className="select-sm" value={filterService}  onChange={e=>setFilterService(e.target.value)}><option value="">All Service Lines</option>{SERVICE_LINES.map(s=><option key={s}>{s}</option>)}</select>
        <select className="select-sm" value={filterIndustry} onChange={e=>setFilterIndustry(e.target.value)}><option value="">All Industries</option>{uniqIndustries.map(s=><option key={s}>{s}</option>)}</select>
        <select className="select-sm" value={filterPlatform} onChange={e=>setFilterPlatform(e.target.value)}><option value="">All Platforms</option>{uniqPlatforms.map(s=><option key={s}>{s}</option>)}</select>
        <select className="select-sm" value={filterOwner}    onChange={e=>setFilterOwner(e.target.value)}><option value="">All Owners</option>{teamMembers.map(m=><option key={m}>{m}</option>)}</select>
        <select className="select-sm" value={filterAssigned} onChange={e=>setFilterAssigned(e.target.value)}><option value="">All Assigned</option>{teamMembers.map(m=><option key={m}>{m}</option>)}</select>
        {hasFilters&&<button className="btn btn-ghost btn-sm" onClick={clearFilters} style={{color:'var(--rh-crimson)'}}>Clear ×</button>}
      </div>
      {/* ── Bulk update bar ── */}
      {moduleTab==='prospects'&&visible.length>0&&<div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 16px',background:'rgba(14,40,65,0.04)',borderBottom:'1px solid var(--border)',flexShrink:0,flexWrap:'wrap'}}>
        <span style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',whiteSpace:'nowrap'}}>Bulk Update {visible.length} visible:</span>
        <select className="select-sm" value={bulkOwner} onChange={e=>setBulkOwner(e.target.value)}>
          <option value="">Owner — no change</option>
          {teamMembers.map(m=><option key={m}>{m}</option>)}
        </select>
        <select className="select-sm" value={bulkAssigned} onChange={e=>setBulkAssigned(e.target.value)}>
          <option value="">Assigned To — no change</option>
          {teamMembers.map(m=><option key={m}>{m}</option>)}
        </select>
        <button className="btn btn-primary btn-sm" disabled={!bulkOwner&&!bulkAssigned} onClick={()=>{applyBulk();setBulkOwner('');setBulkAssigned('');}}>Apply to All Visible</button>
        {(bulkOwner||bulkAssigned)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setBulkOwner('');setBulkAssigned('');}}>Cancel</button>}
      </div>}
      {/* ── Module tab bar ── */}
      <div style={{display:'flex',alignItems:'center',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
        <div className={`panel-tab${moduleTab==='prospects'?' active':''}`} onClick={()=>setModuleTab('prospects')}>📋 Prospects</div>
        <div className={`panel-tab${moduleTab==='analytics'?' active':''}`} onClick={()=>setModuleTab('analytics')}>📊 Analytics & Recommendations</div>
        {moduleTab==='prospects'&&<div className="research-stat-bar" style={{flex:1,borderBottom:'none',padding:'0 16px'}}>
          <span><strong>{counts.total}</strong> total</span>
          <span style={{color:'var(--rh-crimson)'}}><strong>{counts.newCount}</strong> new</span>
          <span style={{color:'var(--rh-gold)'}}><strong>{counts.hot}</strong> hot</span>
          <span style={{color:'var(--success)'}}><strong>{counts.promoted}</strong> promoted</span>
          {hasFilters&&<span style={{color:'var(--text-light)',fontSize:11}}>· showing <strong style={{color:'var(--text)'}}>{visible.length}</strong> (filtered)</span>}
        </div>}
      </div>

      {/* ── Analytics tab ── */}
      {moduleTab==='analytics'&&<AnalyticsTab items={items} teamMembers={teamMembers}/>}

      {/* ── Prospects tab: Table + side panel ── */}
      {moduleTab==='prospects'&&<div className="main">
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {visible.length===0
            ? <div className="empty"><div className="empty-icon">🔬</div><strong>No research items</strong><span>{hasFilters||search?'Try adjusting your filters.':'Import a research.json file to get started.'}</span>{(hasFilters||search)&&<button className="btn btn-ghost btn-sm" onClick={clearFilters}>Clear filters</button>}</div>
            : <div className="table-wrap">
                <table className="leads-table">
                  <thead><tr>
                    <th style={{width:52,cursor:'pointer'}} onClick={()=>toggleSort('opportunityScore')}>Score <SortIcon k="opportunityScore"/></th>
                    <th style={{cursor:'pointer'}} onClick={()=>toggleSort('contactName')}>Contact <SortIcon k="contactName"/></th>
                    <th style={{cursor:'pointer'}} onClick={()=>toggleSort('company')}>Company / Industry <SortIcon k="company"/></th>
                    <th style={{cursor:'pointer',width:110}} onClick={()=>toggleSort('geography')}>Geography <SortIcon k="geography"/></th>
                    <th style={{cursor:'pointer'}} onClick={()=>toggleSort('recommendedServiceLine')}>Service Fit <SortIcon k="recommendedServiceLine"/></th>
                    <th>Key Signals</th>
                    <th style={{cursor:'pointer',width:110}} onClick={()=>toggleSort('owner')}>Owner <SortIcon k="owner"/></th>
                    <th style={{cursor:'pointer',width:130}} onClick={()=>toggleSort('assignedTo')}>Assigned To <SortIcon k="assignedTo"/></th>
                    <th style={{cursor:'pointer',width:100}} onClick={()=>toggleSort('status')}>Status <SortIcon k="status"/></th>
                    <th style={{width:180}}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {visible.map(item=>{
                      const sc=item.opportunityScore||0;
                      const geo=item.geography||'US';
                      const isUS=geo==='US';
                      return (
                        <tr key={item.id} className={`lead-row${selected?.id===item.id?' selected':''}`} onClick={()=>setSelected(selected?.id===item.id?null:item)}>
                          <td><div className="score-circle" style={{background:scoreColor(sc)}}>{sc}</div></td>
                          <td><div className="lead-name">{item.contactName}</div><div className="lead-org">{item.title}</div></td>
                          <td><div style={{fontWeight:500,fontSize:13}}>{item.company}</div><div className="lead-org">{item.industry}{item.companySize?' · '+item.companySize:''}</div></td>
                          <td><span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,fontWeight:500,padding:'2px 8px',borderRadius:10,background:isUS?'#e8f4e8':' #fff3e0',color:isUS?'#2e7d32':'#e65100'}}>{isUS?'🇺🇸':'🌐'} {geo}</span></td>
                          <td><div style={{fontSize:12,color:'var(--rh-navy)',fontWeight:500,maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.recommendedServiceLine||'—'}</div>{item.currentPlatform&&<div className="lead-org">{item.currentPlatform}</div>}</td>
                          <td style={{maxWidth:180}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{(item.signals&&item.signals.length?item.signals:(item.urgencyIndicators?item.urgencyIndicators.split(',').map(function(s){return s.trim()}).filter(Boolean):(item.primarySignal?[item.primarySignal]:[]))).slice(0,3).map(function(s){return <span key={s} className="signal-chip" style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'inline-block'}}>{s}</span>})}{(item.signals&&item.signals.length?item.signals:(item.urgencyIndicators?item.urgencyIndicators.split(',').map(function(s){return s.trim()}).filter(Boolean):[])).length>3&&<span style={{fontSize:10,color:'var(--text-muted)'}}>+{(item.signals&&item.signals.length?item.signals:item.urgencyIndicators.split(',').map(function(s){return s.trim()}).filter(Boolean)).length-3} more</span>}</div></td>
                          <td onClick={e=>e.stopPropagation()}>
                            <select className="select-sm" style={{fontSize:12,padding:'3px 6px',width:'100%'}} value={item.owner||''} onChange={e=>setOwnerVal(item.id,e.target.value)}>
                              <option value="">— Unassigned —</option>
                              {teamMembers.map(m=><option key={m}>{m}</option>)}
                            </select>
                          </td>
                          <td onClick={e=>e.stopPropagation()}>
                            <select className="select-sm" style={{fontSize:12,padding:'3px 6px',width:'100%'}} value={item.assignedTo||''} onChange={e=>setAssigned(item.id,e.target.value)}>
                              <option value="">— Unassigned —</option>
                              {teamMembers.map(m=><option key={m}>{m}</option>)}
                            </select>
                          </td>
                          <td><span className={`status-badge ${statusCls(item.status)}`}>{item.status}</span></td>
                          <td>
                            <div style={{display:'flex',gap:5}} onClick={e=>e.stopPropagation()}>
                              {item.status!=='Promoted'&&item.status!=='Archived'&&<button className="btn btn-primary btn-sm" onClick={()=>handlePromote(item)}>→ Promote</button>}
                              {item.status==='Promoted'&&<span style={{fontSize:11,color:'var(--success)',fontWeight:600}}>✓ Active</span>}
                              {item.status==='New'&&<button className="btn btn-ghost btn-sm" onClick={()=>reviewItem(item.id)}>Reviewed</button>}
                              {item.status!=='Archived'&&item.status!=='Promoted'&&<button className="btn btn-ghost btn-sm" style={{color:'var(--text-muted)'}} onClick={()=>archiveItem(item.id)}>Archive</button>}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div style={{padding:'8px 16px',fontSize:12,color:'var(--text-muted)',borderTop:'1px solid var(--border)',background:'var(--surface)'}}>
                  {visible.length} item{visible.length!==1?'s':''}{hasFilters?` of ${items.length} total`:''} · {counts.promoted} promoted to Active Leads
                </div>
              </div>
          }
        </div>

        {/* ── Detail side panel ── */}
        {selected&&(
          <div className="side-panel">
            <div className="panel-header">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1,paddingRight:8}}><div className="panel-title">{selected.contactName}</div><div className="panel-org">🏢 {selected.company}</div></div>
                <button className="modal-close" onClick={()=>setSelected(null)} style={{marginTop:2,color:'var(--text-muted)'}}>×</button>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,margin:'8px 0'}}>
                <div className="score-circle" style={{background:scoreColor(selected.opportunityScore||0)}}>{selected.opportunityScore||0}</div>
                <div><div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>Opportunity Score</div><div style={{fontSize:11,color:'var(--text-muted)'}}>{selected.sector} · {selected.source}</div></div>
              </div>
              <div className="panel-actions">
                {selected.status!=='Promoted'&&selected.status!=='Archived'&&<button className="btn btn-primary btn-sm" onClick={()=>handlePromote(selected)}>→ Move to Active Leads</button>}
                {selected.status==='Promoted'&&<span style={{color:'var(--success)',fontSize:13,fontWeight:600}}>✓ In Active Leads</span>}
              </div>
              <div className="panel-tabs" style={{marginTop:0}}><div className="panel-tab active" style={{color:'var(--rh-crimson)',borderBottomColor:'var(--rh-crimson)'}}>Research Details</div></div>
            </div>
            <div className="panel-body">
              <div className="panel-section-label">Assignment</div>
              <div className="info-grid">
                <span className="info-label">Owner</span>
                <span className="info-value">
                  <select className="select-sm" style={{fontSize:12,width:'100%'}} value={selected.owner||''} onChange={e=>setOwnerVal(selected.id,e.target.value)}>
                    <option value="">— Unassigned —</option>
                    {teamMembers.map(m=><option key={m}>{m}</option>)}
                  </select>
                </span>
                <span className="info-label">Assigned To</span>
                <span className="info-value">
                  <select className="select-sm" style={{fontSize:12,width:'100%'}} value={selected.assignedTo||''} onChange={e=>setAssigned(selected.id,e.target.value)}>
                    <option value="">— Unassigned —</option>
                    {teamMembers.map(m=><option key={m}>{m}</option>)}
                  </select>
                </span>
              </div>
              <div className="panel-section-label">Contact & Company</div>
              <div className="info-grid">
                <span className="info-label">Title</span><span className="info-value">{selected.title||'—'}</span>
                <span className="info-label">Sector</span><span className="info-value">{selected.sector||'—'}</span>
                <span className="info-label">Industry</span><span className="info-value">{selected.industry||'—'}</span>
                <span className="info-label">Size</span><span className="info-value">{selected.companySize||'—'}</span>
                <span className="info-label">Platform</span><span className="info-value">{selected.currentPlatform||'—'}</span>
                <span className="info-label">Service Fit</span><span className="info-value" style={{color:'var(--rh-navy)',fontWeight:600}}>{selected.recommendedServiceLine||'—'}</span>
                <span className="info-label">Researched</span><span className="info-value">{fmtDate(selected.researchedAt)}</span>
                <span className="info-label">Source</span><span className="info-value">{selected.source||'—'}</span>
              </div>
              {selected.signals?.length>0&&(<><div className="panel-section-label">Trigger Signals</div><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{selected.signals.map(s=><span key={s} className="signal-chip" style={{fontSize:11,padding:'3px 9px'}}>{s}</span>)}</div></>)}
              {selected.painPoints&&(<><div className="panel-section-label">Pain Points / Context</div><div style={{fontSize:13,lineHeight:1.6,background:'var(--rh-teal-light)',borderRadius:'var(--radius)',padding:'10px 12px',borderLeft:'3px solid var(--rh-teal)'}}>{selected.painPoints}</div></>)}
              {selected.notes&&(<><div className="panel-section-label">Notes</div><div style={{fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{selected.notes}</div></>)}
            </div>
          </div>
        )}
      </div>}{/* /prospects tab */}
    </div>
  );
}

// ─── DASHBOARD MODULE ─────────────────────────────────────────────────────────
function DashboardModule({leads, teamMembers, token, currentUser}) {
  // Admins land on Overall; other users land on their own tab if their username matches a team member name
  const defaultOwner = useMemo(()=>{
    if (!currentUser || currentUser.role==='admin') return 'overall';
    const match = (teamMembers||[]).find(m=>m.toLowerCase()===currentUser.username.toLowerCase());
    return match || 'overall';
  },[currentUser, teamMembers]);

  const [owner, setOwner] = useState(defaultOwner);
  const [usage, setUsage] = useState(null);
  const today = todayStr();

  useEffect(()=>{
    if(!token) return;
    apiFetch('/api/usage','GET',null,token).then(r=>{ if(r.ok) setUsage(r); });
  },[token]);

  const vLeads = owner==='overall' ? leads : leads.filter(l=>(l.assignedTo||l.owner||'')===owner);
  const open   = vLeads.filter(l=>l.stage!=='Won'&&l.stage!=='Lost');
  const won    = vLeads.filter(l=>l.stage==='Won');
  const lost   = vLeads.filter(l=>l.stage==='Lost');
  const hot    = open.filter(l=>l.labels&&l.labels.includes('hot'));
  const overdue= open.filter(l=>l.followUpDate&&l.followUpDate<today);
  const pipVal = open.reduce((s,l)=>s+(l.value||0),0);
  const wonVal = won.reduce((s,l)=>s+(l.value||0),0);
  const closedTotal = won.length+lost.length;
  const winRate= closedTotal>0 ? Math.round(won.length/closedTotal*100) : null;
  const valuedOpen = open.filter(l=>l.value);
  const avgDeal= valuedOpen.length ? Math.round(pipVal/valuedOpen.length) : 0;

  const stageColors={'Target':'#94a3b8','Outreach':'#60a5fa','Discovery':'#a78bfa','Proposal':'#fb923c','Negotiation':'#f59e0b','Won':'#22c55e','Lost':'#ef4444'};
  const stageData = STAGES.map(s=>({s, count:vLeads.filter(l=>l.stage===s).length, value:vLeads.filter(l=>l.stage===s).reduce((t,l)=>t+(l.value||0),0)}));
  const maxStageCt = Math.max(1,...stageData.map(d=>d.count));

  const svcData = SERVICE_LINES.map(sl=>({sl, count:open.filter(l=>l.serviceLine===sl).length, value:open.filter(l=>l.serviceLine===sl).reduce((t,l)=>t+(l.value||0),0)})).filter(d=>d.count>0).sort((a,b)=>b.value-a.value);
  const maxSvc = Math.max(1,...svcData.map(d=>d.count));

  const ownerData = (teamMembers||[]).map(m=>({m,
    open:  leads.filter(l=>(l.assignedTo||l.owner||'')===m&&l.stage!=='Won'&&l.stage!=='Lost').length,
    hot:   leads.filter(l=>(l.assignedTo||l.owner||'')===m&&(l.labels||[]).includes('hot')).length,
    ov:    leads.filter(l=>(l.assignedTo||l.owner||'')===m&&l.followUpDate&&l.followUpDate<today&&l.stage!=='Won'&&l.stage!=='Lost').length,
    value: leads.filter(l=>(l.assignedTo||l.owner||'')===m&&l.stage!=='Won'&&l.stage!=='Lost').reduce((s,l)=>s+(l.value||0),0),
    won:   leads.filter(l=>(l.assignedTo||l.owner||'')===m&&l.stage==='Won').length,
    lost:  leads.filter(l=>(l.assignedTo||l.owner||'')===m&&l.stage==='Lost').length,
  }));

  const topOpps = open.filter(l=>l.value).sort((a,b)=>(b.value||0)-(a.value||0)).slice(0,10);
  const overdueList = [...overdue].sort((a,b)=>a.followUpDate.localeCompare(b.followUpDate)).slice(0,8);
  const daysOv = d => Math.floor((new Date(today)-new Date(d))/(864e5));

  const KPI = ({icon,label,value,sub,color='var(--rh-navy)'}) => (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'16px 20px',flex:1,minWidth:130}}>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>{icon} {label}</div>
      <div style={{fontSize:24,fontWeight:700,color,lineHeight:1.1}}>{value??'—'}</div>
      {sub&&<div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>{sub}</div>}
    </div>
  );
  const Card = ({title,children,style={}}) => (
    <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',...style}}>
      <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13,color:'var(--rh-navy)'}}>{title}</div>
      <div style={{padding:'16px 18px'}}>{children}</div>
    </div>
  );
  const Bar = ({pct,color='var(--rh-crimson)',h=12}) => (
    <div style={{background:'var(--bg)',borderRadius:6,height:h,overflow:'hidden',flex:1}}>
      <div style={{width:`${Math.max(2,pct)}%`,background:color,height:'100%',borderRadius:6,transition:'width .4s'}}/>
    </div>
  );

  return (
    <div style={{flex:1,overflow:'auto',background:'var(--bg)',display:'flex',flexDirection:'column'}}>
      {/* Owner selector */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0,overflowX:'auto'}}>
        <div className={`panel-tab${owner==='overall'?' active':''}`} onClick={()=>setOwner('overall')}>📊 Overall</div>
        {(teamMembers||[]).map(m=><div key={m} className={`panel-tab${owner===m?' active':''}`} onClick={()=>setOwner(m)}>{m}</div>)}
      </div>

      <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:18}}>

        {/* KPI Row */}
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <KPI icon="💰" label="Pipeline Value" value={fmtCurrency(pipVal)} sub={wonVal?`+${fmtCurrency(wonVal)} closed`:open.length?null:'No open leads'} color="var(--rh-teal)"/>
          <KPI icon="📊" label="Open Leads" value={open.length} sub={`${won.length} won · ${lost.length} lost`} color="var(--rh-navy)"/>
          <KPI icon="🔥" label="Hot Leads" value={hot.length} sub={open.length?`${Math.round(hot.length/Math.max(1,open.length)*100)}% of pipeline`:null} color="var(--rh-crimson)"/>
          <KPI icon="⚠️" label="Overdue Follow-ups" value={overdue.length} sub={overdue.length?'action required':'all current'} color={overdue.length?'#dc2626':'var(--success)'}/>
          <KPI icon="🏆" label="Win Rate" value={winRate!==null?`${winRate}%`:null} sub={closedTotal?`${won.length}W / ${lost.length}L`:'no closed deals yet'} color={winRate>=50?'var(--success)':winRate!==null?'var(--danger)':'var(--text-muted)'}/>
          <KPI icon="📈" label="Avg Deal Size" value={avgDeal?fmtCurrency(avgDeal):null} sub={valuedOpen.length?`${valuedOpen.length} valued leads`:null} color="var(--text-muted)"/>
        </div>

        {/* AI Spend Card — overall view only */}
        {owner==='overall'&&usage&&(()=>{
          const mo    = usage.monthly||{};
          const ytd   = usage.ytd||{};
          const limit = usage.limit||0;
          const spent = mo.cost||0;
          const rem   = usage.remaining;
          const pct   = limit>0 ? Math.min(100, spent/limit*100) : 0;
          const barColor = pct>=90?'#dc2626':pct>=70?'#f59e0b':'var(--rh-teal)';
          const fmt$ = v => v<0.01 ? '<$0.01' : `$${v.toFixed(2)}`;
          return (
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'16px 20px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--rh-navy)'}}>🤖 AI Research Spend</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>{mo.calls||0} API call{mo.calls!==1?'s':''} this month</div>
              </div>
              <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:limit>0?14:0}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>This Month</div>
                  <div style={{fontSize:22,fontWeight:700,color:pct>=90&&limit>0?'#dc2626':'var(--rh-navy)'}}>{fmt$(spent)}</div>
                </div>
                {limit>0&&<div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Remaining</div>
                  <div style={{fontSize:22,fontWeight:700,color:rem<=0?'#dc2626':rem<limit*0.1?'#f59e0b':'var(--success)'}}>{rem<=0?'$0.00':fmt$(rem)}</div>
                </div>}
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>YTD Total</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--text-muted)'}}>{fmt$(ytd.cost||0)}</div>
                </div>
                {limit>0&&<div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>Monthly Limit</div>
                  <div style={{fontSize:22,fontWeight:700,color:'var(--text)'}}>${Number(limit).toFixed(2)}</div>
                </div>}
              </div>
              {limit>0&&<div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text-muted)',marginBottom:4}}>
                  <span>{pct.toFixed(0)}% of monthly budget used</span>
                  {pct>=90&&<span style={{color:'#dc2626',fontWeight:700}}>⚠ Near limit</span>}
                </div>
                <div style={{background:'var(--bg)',borderRadius:6,height:8,overflow:'hidden'}}>
                  <div style={{width:`${pct}%`,background:barColor,height:'100%',borderRadius:6,transition:'width .4s'}}/>
                </div>
              </div>}
              {!limit&&<div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>No monthly limit set — configure one in Maintenance → Research AI.</div>}
            </div>
          );
        })()}

        {/* Middle grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:16,alignItems:'start'}}>

          {/* Left column */}
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <Card title="Pipeline by Stage">
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {stageData.map(({s,count,value})=>(
                  <div key={s}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12,alignItems:'center'}}>
                      <span style={{fontWeight:700,color:stageColors[s]||'var(--text)',display:'flex',alignItems:'center',gap:6}}>
                        <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:stageColors[s]||'var(--border)'}}/>
                        {s}
                      </span>
                      <span style={{color:'var(--text-muted)'}}>{count} lead{count!==1?'s':''}{value?` · ${fmtCurrency(value)}`:''}</span>
                    </div>
                    <Bar pct={count/maxStageCt*100} color={stageColors[s]||'var(--rh-crimson)'}/>
                  </div>
                ))}
              </div>
            </Card>

            {svcData.length>0&&<Card title="Open Pipeline by Service Line">
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {svcData.map(({sl,count,value})=>(
                  <div key={sl}>

Blair Bass

function MaintenanceModule({settings, setSettings, onImportResearch, onImportERP, onExportNow, onRunResearch, onRunContactsResearch, onRunCompanyResearch}) {
  const [tab, setTab]           = useState('team');
  const [newName, setNewName]   = useState('');
  const [editIdx, setEditIdx]   = useState(null);
  const [editVal, setEditVal]   = useState('');
  const [newErp, setNewErp]     = useState('');
  const [editErpIdx, setEditErpIdx] = useState(null);
  const [editErpVal, setEditErpVal] = useState('');
  const [importOwner, setImportOwner]   = useState('Blair');
  const [importTarget, setImportTarget] = useState('contacts'); // 'contacts' | 'erp'
  const importFileRef = useRef(null);
  const [researchRunning,  setResearchRunning]  = useState(false);
  const [researchResult,   setResearchResult]   = useState(null);
  const [contactsRunning,  setContactsRunning]  = useState(false);
  const [companyRunning,   setCompanyRunning]   = useState(false);
  const [companyResult,    setCompanyResult]    = useState(null);
  const [contactsResult,   setContactsResult]   = useState(null);

  const members  = settings.teamMembers || [];
  const erpSystems = settings.erpSystems || [];

  const saveMembers = updated => setSettings(s=>({...s, teamMembers:updated}));
  const saveErp     = updated => setSettings(s=>({...s, erpSystems:updated}));

  // Team members CRUD
  const addMember    = () => { const n=newName.trim(); if(!n||members.includes(n)) return; saveMembers([...members,n]); setNewName(''); };
  const removeMember = i  => { if(!confirm(`Remove "${members[i]}"?`)) return; saveMembers(members.filter((_,j)=>j!==i)); };
  const startEdit    = i  => { setEditIdx(i); setEditVal(members[i]); };
  const commitEdit   = () => { const n=editVal.trim(); if(!n){setEditIdx(null);return;} saveMembers(members.map((m,i)=>i===editIdx?n:m)); setEditIdx(null); };

  // ERP systems CRUD
  const addErp       = () => { const n=newErp.trim(); if(!n||erpSystems.includes(n)) return; saveErp([...erpSystems,n]); setNewErp(''); };
  const removeErp    = i  => { if(!confirm(`Remove "${erpSystems[i]}"?`)) return; saveErp(erpSystems.filter((_,j)=>j!==i)); };
  const startErpEdit = i  => { setEditErpIdx(i); setEditErpVal(erpSystems[i]); };
  const commitErpEdit= () => { const n=editErpVal.trim(); if(!n){setEditErpIdx(null);return;} saveErp(erpSystems.map((s,i)=>i===editErpIdx?n:s)); setEditErpIdx(null); };

  // CSV parser (handles quoted fields)
  const parseCSV = text => {
    const lines = text.split('\n').filter(l => l.trim());
    const headerIdx = lines.findIndex(l => /first.?name/i.test(l) || /contact.?name/i.test(l) || /name.*company/i.test(l));
    if (headerIdx === -1) return null;
    const parseRow = line => {
      const cols = []; let cur = ''; let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur.trim()); return cols;
    };
    const headers = parseRow(lines[headerIdx]).map(h => h.replace(/^"|"$/g,'').toLowerCase().trim());
    const col = name => headers.findIndex(h => h.includes(name));
    const iFirstName = col('first name'); const iLastName = col('last name');
    const iName = col('contact name') !== -1 ? col('contact name') : col('name');
    const iUrl = col('url'); const iEmail = col('email');
    const iCompany = col('company'); const iPosition = col('position') !== -1 ? col('position') : col('title');
    const iConnected = col('connected');
    return lines.slice(headerIdx + 1).filter(l => l.trim()).map(line => {
      const cols = parseRow(line).map(c => c.replace(/^"|"$/g,'').trim());
      const get = i => (i >= 0 ? cols[i] : '') || '';
      const firstName = get(iFirstName); const lastName = get(iLastName);
      const contactName = iFirstName >= 0 ? (firstName + ' ' + lastName).trim() : get(iName);
      if (!contactName) return null;
      return {
        id: uid(),
        contactName,
        company: get(iCompany),
        title: get(iPosition),
        linkedInUrl: get(iUrl),
        email: get(iEmail),
        sector: '', industry: '', companySize: '',
        opportunityScore: 5,
        recommendedServiceLine: '',
        currentPlatform: '',
        signals: [],
        painPoints: get(iConnected) ? ('LinkedIn connection since ' + get(iConnected) + '. No AI research run yet.') : 'Imported from CSV. No AI research run yet.',
        researchedAt: new Date().toISOString().slice(0,10),
        source: 'CSV Import',
        status: 'New',
        promotedLeadId: null,
        notes: '',
        owner: importOwner,
        assignedTo: importOwner,
      };
    }).filter(Boolean);
  };

  // File import handler — supports JSON and CSV
  const [importMsg, setImportMsg] = useState('');
  const handleImportFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      const isCSV = /\.(csv)$/i.test(file.name) || (!text.trim().startsWith('{') && !text.trim().startsWith('['));
      try {
        let items;
        if (isCSV) {
          items = parseCSV(text);
          if (!items || !items.length) { setImportMsg('CSV parse failed — could not find a Name/Company header row.'); e.target.value=''; return; }
          // Patch owner/source
          items = items.map(i => ({...i, owner:importOwner, assignedTo:importOwner}));
        } else {
          const data = JSON.parse(text);
          const incoming = Array.isArray(data) ? data : (data.items||data.research||data.findings||[]);
          if (!incoming.length) throw new Error('empty');
          items = incoming.map(i => ({...i, owner:importOwner, assignedTo:i.assignedTo||importOwner, source:i.source||file.name, id:i.id||uid(), status:i.status||'New', promotedLeadId:null}));
        }
        if (importTarget === 'contacts') onImportResearch(items);
        else onImportERP(items);
        setImportMsg('Imported ' + items.length + ' record' + (items.length !== 1 ? 's' : '') + ' into ' + (importTarget === 'contacts' ? 'Contacts Research' : 'ERP Research') + '. Duplicates (matching LinkedIn URL) are skipped automatically.');
      } catch(err) { setImportMsg('Import failed — ' + (isCSV ? 'could not parse the CSV file.' : 'expected a JSON array of research items.')); }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  return (
    <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
      {/* Tab bar */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
        {[{id:'team',label:'👥 Team Members'},{id:'erp',label:'🗄 Business/Technology Solutions'},{id:'companies',label:'🎯 Companies/Names'},{id:'import',label:'⬆ File Import'},{id:'export',label:'📤 Export Settings'},{id:'research-ai',label:'🤖 Research AI'},{id:'sso',label:'🔒 SSO / Auth'}].map(t=>(
          <div key={t.id} className={`panel-tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>
        ))}
      </div>

      <div style={{flex:1,overflow:'auto',padding:'24px 32px',maxWidth:720}}>

        {/* ── Team Members ── */}
        {tab==='team'&&<>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--rh-navy)',marginBottom:4}}>Team Members</div>
            <div style={{color:'var(--text-muted)',fontSize:13}}>These names appear in the Owner and Assigned To dropdowns in both Research Intelligence modules.</div>
          </div>
          <TableShell
            header={<div><div style={{fontSize:14,fontWeight:700,color:'#fff'}}>👥 Team Members</div><div style={{fontSize:11,color:'rgba(255,255,255,0.45)',marginTop:2}}>Used in Owner and Assigned To dropdowns</div></div>}
            count={`${members.length} members`}
            footer={<AddRow value={newName} onChange={e=>setNewName(e.target.value)} onKey={e=>e.key==='Enter'&&addMember()} onAdd={addMember} disabled={!newName.trim()||members.includes(newName.trim())} dupWarn={newName.trim()&&members.includes(newName.trim())}/>}
          >
            {members.length===0&&<tr><td colSpan={3} style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontStyle:'italic'}}>No members yet.</td></tr>}
            {members.map((m,i)=>(
              <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'10px 20px',color:'var(--text-muted)',width:36}}>{i+1}</td>
                <td style={{padding:'10px 20px'}}>{editIdx===i?<input style={{padding:'5px 10px',border:'1.5px solid var(--rh-crimson)',borderRadius:'var(--radius)',fontSize:13,fontFamily:'inherit',outline:'none',width:200}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')setEditIdx(null);}} autoFocus/>:<span style={{fontWeight:600,color:'var(--text)'}}>{m}</span>}</td>
                <td style={{padding:'10px 20px',textAlign:'right'}}><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>{editIdx===i?<><button className="btn btn-primary btn-sm" onClick={commitEdit}>Save</button><button className="btn btn-ghost btn-sm" onClick={()=>setEditIdx(null)}>Cancel</button></>:<><button className="btn btn-ghost btn-sm" onClick={()=>startEdit(i)}>Edit</button><button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',borderColor:'var(--danger)'}} onClick={()=>removeMember(i)}>Remove</button></>}</div></td>
              </tr>
            ))}
          </TableShell>
          <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6}}>Changes save automatically. Removing a name does not affect existing records.</div>
        </>}

        {/* ── ERP Systems ── */}
        {tab==='erp'&&<>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--rh-navy)',marginBottom:4}}>ERP Systems to Research</div>
            <div style={{color:'var(--text-muted)',fontSize:13}}>These platforms drive the search terms used when running Business/Technology Solutions Intelligence scans. Add any system you want monitored.</div>
          </div>
          <TableShell
            header={<div><div style={{fontSize:14,fontWeight:700,color:'#fff'}}>🗄 ERP Systems</div><div style={{fontSize:11,color:'rgba(255,255,255,0.45)',marginTop:2}}>Platforms scanned in Business/Technology Solutions Intelligence</div></div>}
            count={`${erpSystems.length} systems`}
            footer={<AddRow value={newErp} onChange={e=>setNewErp(e.target.value)} onKey={e=>e.key==='Enter'&&addErp()} onAdd={addErp} disabled={!newErp.trim()||erpSystems.includes(newErp.trim())} dupWarn={newErp.trim()&&erpSystems.includes(newErp.trim())}/>}
          >
            {erpSystems.length===0&&<tr><td colSpan={3} style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontStyle:'italic'}}>No ERP systems configured yet.</td></tr>}
            {erpSystems.map((s,i)=>(
              <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'10px 20px',color:'var(--text-muted)',width:36}}>{i+1}</td>
                <td style={{padding:'10px 20px'}}>{editErpIdx===i?<input style={{padding:'5px 10px',border:'1.5px solid var(--rh-crimson)',borderRadius:'var(--radius)',fontSize:13,fontFamily:'inherit',outline:'none',width:200}} value={editErpVal} onChange={e=>setEditErpVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')commitErpEdit();if(e.key==='Escape')setEditErpIdx(null);}} autoFocus/>:<span style={{fontWeight:600,color:'var(--text)'}}>{s}</span>}</td>
                <td style={{padding:'10px 20px',textAlign:'right'}}><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>{editErpIdx===i?<><button className="btn btn-primary btn-sm" onClick={commitErpEdit}>Save</button><button className="btn btn-ghost btn-sm" onClick={()=>setEditErpIdx(null)}>Cancel</button></>:<><button className="btn btn-ghost btn-sm" onClick={()=>startErpEdit(i)}>Edit</button><button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',borderColor:'var(--danger)'}} onClick={()=>removeErp(i)}>Remove</button></>}</div></td>
              </tr>
            ))}
          </TableShell>
          <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.6}}>Changes save automatically and take effect on the next ERP Research run.</div>
        </>}

        {/* ── Companies/Names ── */}
        {tab==='companies'&&<CompanyTargetsTab settings={settings} setSettings={setSettings}/>}

        {/* ── File Import ── */}
        {tab==='import'&&<>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--rh-navy)',marginBottom:4}}>Import Source Files</div>
            <div style={{color:'var(--text-muted)',fontSize:13}}>Upload a LinkedIn connections CSV or a research JSON file. Choose the target module and owner — every imported record will be assigned to that person. Duplicate entries (matched by LinkedIn URL) are skipped automatically.</div>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'24px',display:'flex',flexDirection:'column',gap:18}}>
            <div className="form-group">
              <label>OWNER OF THIS FILE</label>
              <select value={importOwner} onChange={e=>setImportOwner(e.target.value)} style={{maxWidth:240}}>
                {(members.length?members:['Blair','David','JB','Greg']).map(m=><option key={m}>{m}</option>)}
              </select>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Every record imported will have this person set as the Owner.</div>
            </div>
            <div className="form-group">
              <label>LOAD INTO MODULE</label>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {[{id:'contacts',label:'Contacts Research Intelligence'},{id:'erp',label:'Business/Technology Solutions Intelligence'}].map(o=>(
                  <label key={o.id} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'8px 14px',borderRadius:'var(--radius)',border:`2px solid ${importTarget===o.id?'var(--rh-crimson)':'var(--border)'}`,background:importTarget===o.id?'var(--primary-light)':'var(--bg)',fontSize:13,fontWeight:500}}>
                    <input type="radio" name="importTarget" value={o.id} checked={importTarget===o.id} onChange={()=>setImportTarget(o.id)} style={{accentColor:'var(--rh-crimson)'}}/>{o.label}
                  </label>
                ))}
              </div>
            </div>
            <div className="form-group">
              <label>SELECT FILE</label>
              <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                <input ref={importFileRef} type="file" accept=".csv,.json" style={{display:'none'}} onChange={handleImportFile}/>
                <button className="btn btn-primary" onClick={()=>{setImportMsg('');importFileRef.current.click();}}>⬆ Choose File & Import</button>
                <span style={{fontSize:12,color:'var(--text-muted)'}}>Accepts LinkedIn CSV exports or research JSON files</span>
              </div>
              {importMsg&&<div style={{marginTop:10,padding:'10px 14px',borderRadius:'var(--radius)',background:importMsg.startsWith('Import failed')?'#fff0f0':'#f0faf4',border:'1px solid',borderColor:importMsg.startsWith('Import failed')?'var(--danger)':'#2e7d32',fontSize:13,color:importMsg.startsWith('Import failed')?'var(--danger)':'#1a5c47'}}>{importMsg}</div>}
            </div>
            <div style={{background:'var(--rh-teal-light)',borderLeft:'3px solid var(--rh-teal)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'#1a5c47',lineHeight:1.7}}>
              <strong>LinkedIn CSV:</strong> Go to LinkedIn → Me → Settings → Data Privacy → Get a copy of your data → Connections. Download the CSV and import it here.<br/>
              <strong>Research JSON:</strong> Export from a Claude research session and import the <code style={{background:'rgba(0,0,0,0.06)',padding:'1px 4px',borderRadius:3}}>research.json</code> file directly.
            </div>
          </div>
        </>}

        {/* ── Research AI ── */}
        {tab==='research-ai'&&<>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--rh-navy)',marginBottom:4}}>Research AI Settings</div>
            <div style={{color:'var(--text-muted)',fontSize:13}}>LeadFlow uses the Anthropic Claude API to automatically research ERP opportunities every night at 2:00 AM. Configure your API key and trigger a manual run below.</div>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:24,display:'flex',flexDirection:'column',gap:20}}>
            <div className="form-group">
              <label>ANTHROPIC API KEY</label>
              <input type="password" style={{maxWidth:440,fontFamily:'monospace'}} placeholder="sk-ant-api03-…" value={settings.anthropicApiKey||''} onChange={e=>setSettings(s=>({...s,anthropicApiKey:e.target.value}))}/>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Required for the nightly ERP research job. Get a key at <strong>console.anthropic.com</strong>. Stored locally — never shared externally.</div>
            </div>
            <div className="form-group">
              <label>APOLLO.IO API KEY</label>
              <input type="password" style={{maxWidth:440,fontFamily:'monospace'}} placeholder="your apollo api key…" value={settings.apolloApiKey||''} onChange={e=>setSettings(s=>({...s,apolloApiKey:e.target.value}))}/>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Optional. When set, each company found by Claude is automatically enriched with a real contact name, email, phone, and LinkedIn URL from Apollo.io. Get a key at <strong>app.apollo.io → Settings → Integrations → API</strong>.</div>
            </div>
            <div className="form-group">
              <label>MONTHLY SPEND LIMIT (USD)</label>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:14,fontWeight:600,color:'var(--text-muted)'}}>$</span>
                <input type="number" min="0" step="0.50" style={{maxWidth:120}} placeholder="10.00" value={settings.monthlyApiLimit||''} onChange={e=>setSettings(s=>({...s,monthlyApiLimit:e.target.value}))}/>
              </div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>LeadFlow will not make any Anthropic API calls once this limit is reached for the calendar month. Leave blank for no limit. The nightly research job costs roughly $0.01–$0.05 per run.</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {/* ERP Research run */}
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'16px 20px'}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--rh-navy)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>🏭 Business/Technology Solutions Intelligence</div>
                <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:6}}>
                  <button className="btn btn-primary" disabled={researchRunning||!settings.anthropicApiKey} onClick={async()=>{
                    setResearchRunning(true); setResearchResult(null);
                    const r = await onRunResearch();
                    setResearchRunning(false); setResearchResult(r);
                  }}>{researchRunning?'🔄 Running…':'🔍 Run Now'}</button>
                  {researchRunning&&<span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>Fetching news + calling Claude API…</span>}
                  {researchResult&&!researchRunning&&(researchResult.error
                    ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ {researchResult.error}</span>
                    : researchResult.budgetExceeded
                      ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ Monthly budget reached — no API call made.</span>
                      : researchResult.skipped
                        ? <span style={{fontSize:12,color:'var(--text-muted)'}}>No API key configured.</span>
                        : <span style={{fontSize:12,color:'#1a7a4a',fontWeight:600}}>✓ Added {researchResult.added} {researchResult.added===1?'opportunity':'opportunities'}{researchResult.apolloHits?` · ${researchResult.apolloHits} Apollo contacts`:''}</span>
                  )}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Runs nightly at 2:00 AM · Last run: <strong>{settings.lastERPResearchAt?`${fmtDate(settings.lastERPResearchAt)} at ${new Date(settings.lastERPResearchAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`:'Never'}</strong></div>
              </div>

              {/* Contacts Research run */}
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'16px 20px'}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--rh-navy)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.06em'}}>🔬 Contacts Research Intelligence</div>
                <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:6}}>
                  <button className="btn btn-primary" disabled={contactsRunning||!settings.anthropicApiKey} onClick={async()=>{
                    setContactsRunning(true); setContactsResult(null);
                    const r = await onRunContactsResearch();
                    setContactsRunning(false); setContactsResult(r);
                  }}>{contactsRunning?'🔄 Running…':'🔍 Run Now'}</button>
                  {contactsRunning&&<span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>Finding decision makers + calling Claude API…</span>}
                  {contactsResult&&!contactsRunning&&(contactsResult.error
                    ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ {contactsResult.error}</span>
                    : contactsResult.budgetExceeded
                      ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ Monthly budget reached — no API call made.</span>
                      : contactsResult.skipped
                        ? <span style={{fontSize:12,color:'var(--text-muted)'}}>No API key configured.</span>
                        : <span style={{fontSize:12,color:'#1a7a4a',fontWeight:600}}>✓ Added {contactsResult.added} {contactsResult.added===1?'contact':'contacts'}{contactsResult.apolloHits?` · ${contactsResult.apolloHits} Apollo enriched`:''}</span>
                  )}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Runs nightly at 2:30 AM · Last run: <strong>{settings.lastContactsResearchAt?`${fmtDate(settings.lastContactsResearchAt)} at ${new Date(settings.lastContactsResearchAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`:'Never'}</strong></div>
              </div>

              {/* Company Research run */}
              <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'16px 20px'}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--rh-navy)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>🎯 Company Research Intelligence</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,lineHeight:1.5}}>Researches specific companies and names from your <strong>Companies/Names</strong> list. Add targets there first, then run here.</div>
                <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:6}}>
                  <button className="btn btn-primary" disabled={companyRunning||!settings.anthropicApiKey||(settings.targetCompanies||[]).length===0} onClick={async()=>{
                    setCompanyRunning(true); setCompanyResult(null);
                    const r = await onRunCompanyResearch();
                    setCompanyRunning(false); setCompanyResult(r);
                  }}>{companyRunning?'🔄 Running…':'🎯 Run Now'}</button>
                  {companyRunning&&<span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>Researching your target companies…</span>}
                  {!settings.anthropicApiKey&&<span style={{fontSize:12,color:'var(--text-muted)'}}>Add Anthropic API key above to enable.</span>}
                  {settings.anthropicApiKey&&(settings.targetCompanies||[]).length===0&&!companyRunning&&<span style={{fontSize:12,color:'var(--text-muted)'}}>Add targets in the Companies/Names tab first.</span>}
                  {companyResult&&!companyRunning&&(companyResult.error
                    ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ {companyResult.error}</span>
                    : companyResult.budgetExceeded
                      ? <span style={{fontSize:12,color:'var(--danger)'}}>⚠ Monthly budget reached — no API call made.</span>
                      : companyResult.skipped
                        ? <span style={{fontSize:12,color:'var(--text-muted)'}}>{companyResult.reason==='no targets'?'No targets configured in Companies/Names tab.':'No API key configured.'}</span>
                        : <span style={{fontSize:12,color:'#1a7a4a',fontWeight:600}}>✓ Added {companyResult.added} {companyResult.added===1?'opportunity':'opportunities'}{companyResult.apolloHits?` · ${companyResult.apolloHits} Apollo enriched`:''}</span>
                  )}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>Runs nightly at 3:00 AM · Last run: <strong>{settings.lastCompanyResearchAt?`${fmtDate(settings.lastCompanyResearchAt)} at ${new Date(settings.lastCompanyResearchAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`:'Never'}</strong></div>
              </div>
            </div>

            <div style={{background:'rgba(153,200,187,0.12)',borderLeft:'3px solid var(--rh-teal)',borderRadius:'var(--radius)',padding:'12px 16px',fontSize:12,color:'#1a5c47',lineHeight:1.8}}>
              <strong>How nightly research works</strong><br/>
              Three jobs run automatically every night — ERP at 2:00 AM, Contacts at 2:30 AM, Company Research at 3:00 AM. ERP and Contacts scan broadly for new opportunities; Company Research does a focused deep-dive on your specific targets from the Companies/Names tab. All three enrich results with real contact data from Apollo.io and skip duplicates automatically.<br/><br/>
              <strong>Apollo.io key required</strong> for verified emails, phone numbers, and LinkedIn URLs. Without it, Claude estimates the likely decision maker title — you still get company and signal data.
            </div>
          </div>
        </>}

        {/* ── SSO / Auth ── */}
        {tab==='sso'&&<>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:18,fontWeight:700,color:'var(--rh-navy)',marginBottom:4}}>SSO / Authentication</div>
            <div style={{color:'var(--text-muted)',fontSize:13,lineHeight:1.6}}>Configure Google and/or Microsoft Single Sign-On. Once enabled, team members sign in with their <strong>@redhawkdigital.ai</strong> or <strong>@agr-us.com</strong> accounts — no separate password needed. The username/password admin login always remains available as a fallback.</div>
          </div>

          <div style={{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:8,padding:'14px 18px',fontSize:12,color:'#1e40af',lineHeight:1.7,marginBottom:20}}>
            <strong>Domain enforcement is server-side.</strong> Even if someone knows your server address, only accounts with <code style={{background:'rgba(59,130,246,0.1)',padding:'1px 5px',borderRadius:3}}>@redhawkdigital.ai</code> or <code style={{background:'rgba(59,130,246,0.1)',padding:'1px 5px',borderRadius:3}}>@agr-us.com</code> email addresses can log in via SSO. All other Google or Microsoft accounts are rejected automatically.
          </div>

          {/* Google SSO */}
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:24,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <svg width="20" height="20" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
              <div style={{fontSize:15,fontWeight:700,color:'var(--rh-navy)'}}>Google Workspace SSO</div>
              {settings.googleClientId&&settings.googleClientSecret&&<span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,background:'#dcfce7',color:'#166534'}}>Configured</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div className="form-group">
                <label>GOOGLE CLIENT ID</label>
                <input style={{maxWidth:520,fontFamily:'monospace',fontSize:12}} placeholder="123456789-abc.apps.googleusercontent.com" value={settings.googleClientId||''} onChange={e=>setSettings(s=>({...s,googleClientId:e.target.value.trim()}))}/>
              </div>
              <div className="form-group">
                <label>GOOGLE CLIENT SECRET</label>
                <input type="password" style={{maxWidth:520,fontFamily:'monospace',fontSize:12}} placeholder="GOCSPX-…" value={settings.googleClientSecret||''} onChange={e=>setSettings(s=>({...s,googleClientSecret:e.target.value.trim()}))}/>
