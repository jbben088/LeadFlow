const PAGE_SIZE_BIDS = 25;
function BidsRFQModule({token, bids, setBids, settings}) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);
  const [showIgnored, setShowIgnored] = useState(false);
  const [toast, setToast] = useState(null);

  const runSearch = async () => {
    setLoading(true); setError(''); setResult(null); setPage(1);
    try {
      const r = await apiFetch('/api/search-bids','POST',null,token);
      if (r.ok) { setBids(r.items||[]); setResult(r); }
      else setError(r.error||'Search failed');
    } catch(e) { setError('Could not connect to server.'); }
    setLoading(false);
  };

  const dismissBid = async (bid) => {
    setBids(prev => prev.map(b => b.id===bid.id ? {...b, dismissed:true} : b));
    await apiFetch('/api/dismiss-bid','POST',{bidName:bid.bidName, organization:bid.organization},token);
    let timer;
    setToast({msg:`"${bid.bidName}" ignored.`, onUndo: async () => {
      clearTimeout(timer);
      setBids(prev => prev.map(b => b.id===bid.id ? {...b, dismissed:false} : b));
      await apiFetch('/api/dismiss-bid','POST',{bidName:bid.bidName, organization:bid.organization, undo:true},token);
      setToast(null);
    }});
    timer = setTimeout(()=>setToast(null), 5000);
  };

  const confRank = c => c==='high'?0:c==='medium'?1:2;
  const allFiltered = (bids||[]).filter(b => {
    if ((b.confidence||'').toLowerCase()==='low') return false;
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return (b.bidName||'').toLowerCase().includes(q)||(b.organization||'').toLowerCase().includes(q)||(b.description||'').toLowerCase().includes(q)||(b.serviceMatch||'').toLowerCase().includes(q);
  }).sort((a,b)=>confRank((a.confidence||'').toLowerCase())-confRank((b.confidence||'').toLowerCase()));

  const ignoredCount = allFiltered.filter(b=>b.dismissed).length;
  const filtered = showIgnored ? allFiltered : allFiltered.filter(b=>!b.dismissed);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE_BIDS));
  const safePage = Math.min(page, totalPages);
  const pageItems = filtered.slice((safePage-1)*PAGE_SIZE_BIDS, safePage*PAGE_SIZE_BIDS);

  const lastRun = settings && settings.lastBidsSearchAt ? new Date(settings.lastBidsSearchAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : null;

  const Paginator = () => totalPages <= 1 ? null : (
    <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center',padding:'16px 0 4px',flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(1)} disabled={safePage===1} style={{minWidth:32}}>«</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={safePage===1} style={{minWidth:32}}>‹</button>
      {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>Math.abs(p-safePage)<=2||p===1||p===totalPages).reduce((acc,p,idx,arr)=>{
        if(idx>0&&p-arr[idx-1]>1) acc.push(<span key={"ellip"+p} style={{padding:'0 4px',color:'var(--text-muted)'}}>…</span>);
        acc.push(<button key={p} className={safePage===p?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"} onClick={()=>setPage(p)} style={{minWidth:32}}>{p}</button>);
        return acc;
      },[])}
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={safePage===totalPages} style={{minWidth:32}}>›</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(totalPages)} disabled={safePage===totalPages} style={{minWidth:32}}>»</button>
      <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>Page {safePage} of {totalPages} ({filtered.length} total)</span>
    </div>
  );

  return (
    <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
      {toast&&(
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'#1e293b',color:'#fff',borderRadius:8,padding:'10px 18px',fontSize:13,display:'flex',alignItems:'center',gap:12,zIndex:9999,boxShadow:'0 4px 16px rgba(0,0,0,0.25)'}}>
          <span>{toast.msg}</span>
          <button onClick={toast.onUndo} style={{background:'none',border:'none',color:'#60a5fa',cursor:'pointer',fontWeight:700,fontSize:13,padding:0}}>Undo</button>
        </div>
      )}
      <div style={{padding:'20px 28px',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800,color:'var(--rh-navy)',margin:'0 0 4px'}}>📋 Bids & RFQs</h2>
            <p style={{color:'var(--text-muted)',fontSize:13,margin:0}}>Active government and enterprise procurement opportunities matching Redhawk services.{lastRun&&<span style={{marginLeft:8}}>Last searched: {lastRun}</span>}</p>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            {ignoredCount>0&&<button className="btn btn-ghost btn-sm" onClick={()=>{setShowIgnored(s=>!s);setPage(1);}} style={{fontSize:12}}>{showIgnored?'Hide Ignored':'Show Ignored ('+ignoredCount+')'}</button>}
            <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Filter opportunities..." style={{padding:'7px 12px',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:13,fontFamily:'inherit',outline:'none',width:220}}/>
            <button className="btn btn-primary" onClick={runSearch} disabled={loading||!(settings&&settings.anthropicApiKey)} style={{minWidth:140}}>
              {loading?'Searching...':'Search Now'}
            </button>
          </div>
        </div>
        {!(settings&&settings.anthropicApiKey)&&<div style={{marginTop:10,fontSize:12,color:'var(--danger)'}}>Anthropic API key required. Add it in Maintenance.</div>}
        {error&&<div style={{marginTop:10,fontSize:13,color:'var(--danger)'}}>{error}</div>}
        {result&&!loading&&<div style={{marginTop:10,fontSize:13,color:'#1a7a4a',fontWeight:600}}>Found {result.added} opportunities</div>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'20px 28px'}}>
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 0',color:'var(--text-muted)'}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontWeight:600,marginBottom:6}}>{bids.length?'No matches for your filter':'No bids loaded yet'}</div>
            <div style={{fontSize:13}}>{bids.length?'Clear your search to see all results':'Click Search Now to find current bid opportunities'}</div>
          </div>
        ):(
          <div>
            <Paginator/>
            {pageItems.map(bid=>(
              <div key={bid.id} style={{overflowX:'auto',marginBottom:14,opacity:bid.dismissed?0.45:1}}>
                <div style={{minWidth:600,background:'var(--surface)',border:'1px solid '+(bid.dismissed?'var(--border)':'var(--border)'),borderRadius:10,padding:'18px 22px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10,gap:12}}>

const PAGE_SIZE_EVENTS = 25;
function EventsConferencesModule({token, events, setEvents, settings}) {
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);
  const [showIgnored, setShowIgnored] = useState(false);
  const [toast, setToast] = useState(null);

  const runSearch = async () => {
    setLoading(true); setError(''); setResult(null); setPage(1);
    try {
      const r = await apiFetch('/api/search-events','POST',null,token);
      if (r.ok) { setEvents(r.items||[]); setResult(r); }
      else setError(r.error||'Search failed');
    } catch(e) { setError('Could not connect to server.'); }
    setLoading(false);
  };

  const dismissEvent = async (evt) => {
    setEvents(prev => prev.map(e => e.id===evt.id ? {...e, dismissed:true} : e));
    await apiFetch('/api/dismiss-event','POST',{eventName:evt.eventName, vendor:evt.vendor},token);
    let timer;
    setToast({msg:`"${evt.eventName}" ignored.`, onUndo: async () => {
      clearTimeout(timer);
      setEvents(prev => prev.map(e => e.id===evt.id ? {...e, dismissed:false} : e));
      await apiFetch('/api/dismiss-event','POST',{eventName:evt.eventName, vendor:evt.vendor, undo:true},token);
      setToast(null);
    }});
    timer = setTimeout(()=>setToast(null), 5000);
  };

  const evtConfRank = c => c==='high'?0:c==='medium'?1:2;
  const allFiltered = (events||[]).filter(e => {
    if ((e.confidence||'').toLowerCase()==='low') return false;
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return (e.eventName||'').toLowerCase().includes(q)||(e.vendor||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q)||(e.location||'').toLowerCase().includes(q);
  }).sort((a,b)=>{
    const cr = evtConfRank((a.confidence||'').toLowerCase())-evtConfRank((b.confidence||'').toLowerCase());
    if (cr!==0) return cr;
    const da = a.eventDate?new Date(a.eventDate.split(' ')[0]):new Date('9999');
    const db2 = b.eventDate?new Date(b.eventDate.split(' ')[0]):new Date('9999');
    return da-db2;
  });

  const ignoredCount = allFiltered.filter(e=>e.dismissed).length;
  const filtered = showIgnored ? allFiltered : allFiltered.filter(e=>!e.dismissed);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE_EVENTS));
  const safePage = Math.min(page, totalPages);
  const pageItems = filtered.slice((safePage-1)*PAGE_SIZE_EVENTS, safePage*PAGE_SIZE_EVENTS);

  const lastRun = settings && settings.lastEventsSearchAt ? new Date(settings.lastEventsSearchAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : null;

  const Paginator = () => totalPages <= 1 ? null : (
    <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center',padding:'16px 0 4px',flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(1)} disabled={safePage===1} style={{minWidth:32}}>«</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={safePage===1} style={{minWidth:32}}>‹</button>
      {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>Math.abs(p-safePage)<=2||p===1||p===totalPages).reduce((acc,p,idx,arr)=>{
        if(idx>0&&p-arr[idx-1]>1) acc.push(<span key={"ellip"+p} style={{padding:'0 4px',color:'var(--text-muted)'}}>…</span>);
        acc.push(<button key={p} className={safePage===p?"btn btn-primary btn-sm":"btn btn-ghost btn-sm"} onClick={()=>setPage(p)} style={{minWidth:32}}>{p}</button>);
        return acc;
      },[])}
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={safePage===totalPages} style={{minWidth:32}}>›</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setPage(totalPages)} disabled={safePage===totalPages} style={{minWidth:32}}>»</button>
      <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>Page {safePage} of {totalPages} ({filtered.length} total)</span>
    </div>
  );

  return (
    <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
      {toast&&(
        <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'#1e293b',color:'#fff',borderRadius:8,padding:'10px 18px',fontSize:13,display:'flex',alignItems:'center',gap:12,zIndex:9999,boxShadow:'0 4px 16px rgba(0,0,0,0.25)'}}>
          <span>{toast.msg}</span>
          <button onClick={toast.onUndo} style={{background:'none',border:'none',color:'#60a5fa',cursor:'pointer',fontWeight:700,fontSize:13,padding:0}}>Undo</button>
        </div>
      )}
      <div style={{padding:'20px 28px',borderBottom:'1px solid var(--border)',background:'var(--surface)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800,color:'var(--rh-navy)',margin:'0 0 4px'}}>📅 Events & Conferences</h2>
            <p style={{color:'var(--text-muted)',fontSize:13,margin:0}}>Upcoming ERP vendor conferences and industry events for Redhawk to attend or sponsor.{lastRun&&<span style={{marginLeft:8}}>Last searched: {lastRun}</span>}</p>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            {ignoredCount>0&&<button className="btn btn-ghost btn-sm" onClick={()=>{setShowIgnored(s=>!s);setPage(1);}} style={{fontSize:12}}>{showIgnored?'Hide Ignored':'Show Ignored ('+ignoredCount+')'}</button>}
            <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Filter events..." style={{padding:'7px 12px',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:13,fontFamily:'inherit',outline:'none',width:220}}/>
            <button className="btn btn-primary" onClick={runSearch} disabled={loading||!(settings&&settings.anthropicApiKey)} style={{minWidth:140}}>
              {loading?'Searching...':'Search Now'}
            </button>
          </div>
        </div>
        {!(settings&&settings.anthropicApiKey)&&<div style={{marginTop:10,fontSize:12,color:'var(--danger)'}}>Anthropic API key required. Add it in Maintenance.</div>}
        {error&&<div style={{marginTop:10,fontSize:13,color:'var(--danger)'}}>{error}</div>}
        {result&&!loading&&<div style={{marginTop:10,fontSize:13,color:'#1a7a4a',fontWeight:600}}>Found {result.added} events</div>}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'20px 28px'}}>
        {filtered.length===0?(
          <div style={{textAlign:'center',padding:'60px 0',color:'var(--text-muted)'}}>
            <div style={{fontSize:40,marginBottom:12}}>📅</div>
            <div style={{fontWeight:600,marginBottom:6}}>{events.length?'No matches for your filter':'No events loaded yet'}</div>
            <div style={{fontSize:13}}>{events.length?'Clear your search to see all results':'Click Search Now to find upcoming events and conferences'}</div>
          </div>
        ):(
          <div>
            <Paginator/>
            {pageItems.map(evt=>(
              <div key={evt.id} style={{overflowX:'auto',marginBottom:14,opacity:evt.dismissed?0.45:1}}>
                <div style={{minWidth:600,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'18px 22px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10,gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:'var(--rh-navy)',marginBottom:3}}>{evt.eventName}</div>
                      <div style={{fontSize:13,color:'var(--text-muted)'}}>{evt.vendor&&<span style={{fontWeight:600,color:'var(--rh-crimson)',marginRight:8}}>{evt.vendor}</span>}{evt.location}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      {evt.eventDate&&<div style={{fontSize:13,fontWeight:700,color:'var(--rh-navy)',whiteSpace:'nowrap'}}>{evt.eventDate}</div>}
                      {evt.costToAttend&&<div style={{fontSize:12,color:'var(--text-muted)',marginTop:2,whiteSpace:'nowrap'}}>{evt.costToAttend}</div>}
                    </div>
                  </div>
                  <p style={{fontSize:13,color:'var(--text)',lineHeight:1.6,margin:'0 0 10px'}}>{evt.description}</p>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
                    {evt.url&&!evt.dismissed&&<a href={evt.url} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm" style={{textDecoration:'none'}}>Register / Learn More</a>}
                    {evt.dismissed
                      ? <span style={{fontSize:12,color:'var(--text-muted)',fontStyle:'italic'}}>Ignored</span>
                      : <button className="btn btn-ghost btn-sm" onClick={()=>dismissEvent(evt)} style={{color:'var(--text-muted)',fontSize:12}}>Ignore</button>
                    }
                    {evt.registrationCloseDate&&!evt.dismissed&&<span style={{fontSize:12,color:'var(--text-muted)'}}>Registration closes: {evt.registrationCloseDate}</span>}
                    <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:'auto'}}>Source: {evt.source}</span>
                  </div>
                </div>
              </div>
            ))}
            <Paginator/>
          </div>
        )}
      </div>
    </div>
  );
}
// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  // ── Auth state ──
  const [token, setToken]           = useState(()=>sessionStorage.getItem('lf_token')||null);
  const [currentUser, setCurrentUser] = useState(()=>{ try{return JSON.parse(sessionStorage.getItem('lf_user'));}catch{return null;} });
  const [setupRequired, setSetupRequired] = useState(false);

  // ── Data state ──
  const [leads, setLeads]           = useState([]);
  const [research, setResearch]     = useState([]);
  const [erpResearch, setErpResearch] = useState([]);
  const [companyResearch, setCompanyResearch] = useState([]);
  const [settings, setSettings]     = useState(DEFAULT_SETTINGS);
  const [bids, setBids]             = useState([]);
  const [events, setEvents]         = useState([]);
  const [loading, setLoading]   = useState(true);
  const [dataReady, setDataReady] = useState(false);

  // ── UI state ──
  const [activeTab, setActiveTab]       = useState('dashboard');
  const [selected, setSelected]         = useState(null);
  const [search, setSearch]             = useState('');
  const [filterStage, setFilterStage]   = useState('');
  const [filterLabel, setFilterLabel]   = useState('');
  const [filterSource, setFilterSource] = useState('');
  const [filterSector, setFilterSector] = useState('');
  const [sort, setSort]                 = useState({key:'followUpDate',dir:'asc'});
  const [showModal, setShowModal]       = useState(false);
  const [showUsers, setShowUsers]       = useState(false);
  const [showHelp, setShowHelp]         = useState(false);
  const [checkedIds, setCheckedIds]     = useState(new Set());
  const [savedMsg, setSavedMsg]         = useState(false);

  const importRef       = useRef(null);
  const saveLeadsTimer  = useRef(null);
  const saveResTimer    = useRef(null);
  const saveErpTimer    = useRef(null);
  const saveCoTimer     = useRef(null);
  const saveSettTimer   = useRef(null);
  const saveBidsTimer   = useRef(null);
  const saveEventsTimer = useRef(null);

  // ── Check if first-time setup + handle SSO callback token ──
  useEffect(()=>{
    // Handle token returned from OAuth callback redirect
    const params = new URLSearchParams(window.location.search);
    const ssoToken = params.get('sso_token');
    const ssoUser  = params.get('sso_user');
    const ssoRole  = params.get('sso_role');
    if (ssoToken && ssoUser) {
      const user = {username: ssoUser, role: ssoRole || 'member'};
      sessionStorage.setItem('lf_token', ssoToken);
      sessionStorage.setItem('lf_user', JSON.stringify(user));
      setToken(ssoToken);
      setCurrentUser(user);
      window.history.replaceState({}, '', '/');
      return;
    }
    apiFetch('/api/setup').then(d=>setSetupRequired(d.setupRequired)).catch(()=>{});
  },[]);

  // ── Load data after login ──
  useEffect(()=>{
    if(!token){ setLoading(false); return; }
    setLoading(true);
    const safeFetch = (url,token) => apiFetch(url,'GET',null,token).catch(()=>({ok:true,items:null,leads:null,settings:null}));
    Promise.all([
      safeFetch('/api/leads',token),
      safeFetch('/api/research',token),
      safeFetch('/api/erp-research',token),
      safeFetch('/api/company-research',token),
      safeFetch('/api/settings',token),
      safeFetch('/api/bids',token),
      safeFetch('/api/events',token),
    ]).then(([ld,rd,ed,cd,sd,bd,evd])=>{
      // If any core endpoint returns 401, the token is stale — force re-login
      if(ld.ok===false||rd.ok===false){ handleLogout(); return; }
      if(ld.leads!==null){ setLeads(ld.leads); }
      else { try{const l=JSON.parse(localStorage.getItem('crm_leads_v2')||'null'); setLeads(l||SEED);}catch(e){setLeads(SEED);} }
      if(rd.items!==null){ setResearch(rd.items); }
      else { try{const r=JSON.parse(localStorage.getItem('crm_research_v1')||'null'); setResearch(r||RESEARCH_SEED);}catch(e){setResearch(RESEARCH_SEED);} }
      if(ed&&ed.items!==null){ setErpResearch(ed.items); }
      if(cd&&cd.items!==null){ setCompanyResearch(cd.items); }
      if(sd&&sd.settings!==null){ setSettings({...DEFAULT_SETTINGS,...sd.settings}); }
      if(bd&&bd.items!==null){ setBids(bd.items); }
      if(evd&&evd.items!==null){ setEvents(evd.items); }
      setLoading(false); setDataReady(true);
    }).catch(()=>handleLogout());
  },[token]);

  // ── Save leads (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveLeadsTimer.current);
    saveLeadsTimer.current=setTimeout(()=>{
      apiFetch('/api/leads','POST',{leads},token).then(()=>{ setSavedMsg(true); setTimeout(()=>setSavedMsg(false),1500); });
    },800);
  },[leads,token,dataReady]);

  // ── Save research (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveResTimer.current);
    saveResTimer.current=setTimeout(()=>{ apiFetch('/api/research','POST',{items:research},token); },800);
  },[research,token,dataReady]);

  // ── Save ERP research (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveErpTimer.current);
    saveErpTimer.current=setTimeout(()=>{ apiFetch('/api/erp-research','POST',{items:erpResearch},token); },800);
  },[erpResearch,token,dataReady]);

  // ── Save Company research (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveCoTimer.current);
    saveCoTimer.current=setTimeout(()=>{ apiFetch('/api/company-research','POST',{items:companyResearch},token); },800);
  },[companyResearch,token,dataReady]);

  // ── Save settings (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveSettTimer.current);
    saveSettTimer.current=setTimeout(()=>{ apiFetch('/api/settings','POST',{settings},token); },800);
  },[settings,token,dataReady]);

  // ── Save bids (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveBidsTimer.current);
    saveBidsTimer.current=setTimeout(()=>{ apiFetch('/api/bids','POST',{items:bids},token); },800);
  },[bids,token,dataReady]);

  // ── Save events (debounced 800ms) ──
  useEffect(()=>{
    if(!token||!dataReady) return;
    clearTimeout(saveEventsTimer.current);
    saveEventsTimer.current=setTimeout(()=>{ apiFetch('/api/events','POST',{items:events},token); },800);
  },[events,token,dataReady]);

  // ── Auth handlers ──
  const handleLogin = (tok, username, role) => {
    setToken(tok); setCurrentUser({username,role});

    sessionStorage.setItem('lf_user',JSON.stringify({username,role}));
  };
  const handleLogout = useCallback(()=>{
    if(token) apiFetch('/api/logout','POST',null,token);
    setToken(null); setCurrentUser(null); setLeads([]); setResearch([]); setErpResearch([]); setCompanyResearch([]); setBids([]); setEvents([]); setDataReady(false); setLoading(true);
    sessionStorage.removeItem('lf_token'); sessionStorage.removeItem('lf_user');
  },[token]);

  // ── Lead handlers ──
  const updateLead   = useCallback(u=>{ const up={...u,updatedAt:now()}; setLeads(ls=>ls.map(l=>l.id===up.id?up:l)); setSelected(up); },[]);
  const deleteLead   = useCallback(id=>{ if(!confirm('Delete this lead?')) return; setLeads(ls=>ls.filter(l=>l.id!==id)); setSelected(null); },[]);
  const advanceStage = (lead,next)=>updateLead({...lead,stage:next});
  const promoteLead  = useCallback(lead=>{ setLeads(ls=>[lead,...ls]); setActiveTab('leads'); setSelected(lead); },[]);
  const addLead      = form=>{ const lead={id:uid(),notes:[],activities:[],createdAt:now(),updatedAt:now(),lastActivity:null,sourceModule:'Manual',...form,value:form.value?Number(form.value):null}; setLeads(ls=>[lead,...ls]); setShowModal(false); setSelected(lead); };
  const deleteSelected = ()=>{ if(!checkedIds.size||!confirm(`Delete ${checkedIds.size} lead(s)?`)) return; setLeads(ls=>ls.filter(l=>!checkedIds.has(l.id))); setCheckedIds(new Set()); if(selected&&checkedIds.has(selected.id)) setSelected(null); };
  const exportChanges = async()=>{ const r=await fetch('/api/export-leads',{method:'POST',headers:{'x-session-token':token}}); if(r.status===204){alert('No changes since the last export.\n\nAll leads are up to date.');return;} if(!r.ok){alert('Export failed.');return;} const blob=await r.blob(); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`pipedrive-export-${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); };
  const toggleSort   = key=>setSort(s=>s.key===key?{key,dir:s.dir==='asc'?'desc':'asc'}:{key,dir:'asc'});

  // ── Backup import ──
  const handleImport = e=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ try{const obj=JSON.parse(ev.target.result); const ls=obj.leads||obj; if(!Array.isArray(ls)) throw 0; if(!confirm(`Replace all ${leads.length} leads with ${ls.length} imported leads?`)) return; setLeads(ls); setSelected(null); setCheckedIds(new Set()); e.target.value='';}catch{alert('Import failed: invalid file format.');}}; reader.readAsText(file); };

  // ── Derived ──
  const fuAlerts = useMemo(()=>(leads||[]).filter(l=>l.followUpDate&&l.followUpDate<=todayStr()&&l.stage!=='Won'&&l.stage!=='Lost').sort((a,b)=>a.followUpDate.localeCompare(b.followUpDate)),[leads]);

  const filtered = useMemo(()=>{
    let out=leads||[];
    if(search.trim()){const q=search.toLowerCase();out=out.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.org||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q));}
    if(filterStage)  out=out.filter(l=>l.stage===filterStage);
    if(filterLabel)  out=out.filter(l=>l.labels.includes(filterLabel));
    if(filterSource) out=out.filter(l=>l.source===filterSource);
    if(filterSector) out=out.filter(l=>l.sector===filterSector);
    return [...out].sort((a,b)=>{
      let av=a[sort.key],bv=b[sort.key];
      const nil=sort.dir==='asc'?'￿':'';
      if(av==null||av==='') av=nil; if(bv==null||bv==='') bv=nil;
      if(typeof av==='string') return sort.dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
      return sort.dir==='asc'?av-bv:bv-av;
    });
  },[leads,search,filterStage,filterLabel,filterSource,filterSector,sort]);

  const totalValue  = filtered.reduce((s,l)=>s+(l.value||0),0);
  const allChecked  = filtered.length>0&&filtered.every(l=>checkedIds.has(l.id));
  const toggleAll   = ()=>allChecked?setCheckedIds(new Set()):setCheckedIds(new Set(filtered.map(l=>l.id)));
  const toggleCheck = id=>setCheckedIds(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const SI = ({k})=><span className={`sort-icon${sort.key===k?' sort-active':''}`}>{sort.key===k?(sort.dir==='asc'?'▲':'▼'):'⇅'}</span>;
  const hasFilters  = filterStage||filterLabel||filterSource||filterSector;

  // ── Render gates ──
  if(!token) return <LoginScreen onLogin={handleLogin} setupRequired={setupRequired}/>;
  if(loading) return <LoadingScreen/>;

  const teamMembers = settings.teamMembers || DEFAULT_SETTINGS.teamMembers;

    { label: 'Workspace', items: [
      { id:'dashboard', icon:'📈', label:'Dashboard' },
      { id:'leads', icon:'📊', label:'Active Leads', badge: leads.length||null },
    ]},
    { label: 'Research Intelligence', items: [
      { id:'research', icon:'🔬', label:'Contacts Research', badge: (research||[]).filter(r=>r.status==='New').length||null, badgeTitle:'new' },
      { id:'erp-research', icon:'🏭', label:'Bus/Tech Research', badge: (erpResearch||[]).filter(r=>r.status==='New').length||null, badgeTitle:'new' },
      { id:'company-research', icon:'🎯', label:'Company Research', badge: (companyResearch||[]).filter(r=>r.status==='New').length||null, badgeTitle:'new' },
    ]},
    { label: 'Search & Lookup', items: [
      { id:'contact-lookup', icon:'👤', label:'Contact Lookup' },
      { id:'wildcard-search', icon:'🔍', label:'Wildcard Search' },
    ]},
    { label: 'Market Opportunities', items: [
      { id:'bids-rfq', icon:'📋', label:'Bids & RFQs', badge: (bids||[]).filter(b=>b.status==='New').length||null, badgeTitle:'new' },
      { id:'events', icon:'📅', label:'Events & Conferences' },
    ]},
    { label: 'Settings', items: [
      { id:'maintenance', icon:'⚙️', label:'Maintenance' },
    ]},
  ];

  return (
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {/* HEADER */}
      <div className="app-header">
        <div className="wordmark"><span className="wm-lead">Lead</span><span className="wm-flow">Flow</span></div>
        <span className="wordmark-sub">Redhawk Federal Solutions</span>
        {activeTab==='leads'&&totalValue>0&&<span className="pipeline-val" style={{marginLeft:8}}>Pipeline: {fmtCurrency(totalValue)}</span>}
        <div className="header-right">
          {savedMsg&&<span className="save-indicator">✓ Saved</span>}
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
          {activeTab==='leads'&&<button className="btn btn-ghost btn-sm" style={{color:'#cbd5e1',borderColor:'#334155'}} onClick={()=>importRef.current.click()}>⬆ Import</button>}
          {activeTab==='leads'&&<button className="btn btn-ghost btn-sm" style={{color:'#cbd5e1',borderColor:'#334155'}} onClick={()=>exportBackup(leads)}>⬇ Backup</button>}
        </div>
      </div>

      {/* BODY: left nav + module content */}
      <div className="app-body">

        {/* LEFT NAV */}
        <nav className="left-nav">
          {/* Wordmark / user context */}
          <div style={{padding:'18px 16px 12px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',fontWeight:300,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Signed in as</div>
            <div style={{color:'#fff',fontSize:13,fontWeight:600}}>👤 {currentUser?.username}</div>
            <div style={{color:'rgba(255,255,255,0.35)',fontSize:11,marginTop:2,textTransform:'capitalize'}}>{currentUser?.role}</div>
          </div>

          {/* Module navigation */}
          {NAV_SECTIONS.map((section, si) => (
            <div key={section.label}>
              <div className={`left-nav-section${si>0?' not-first':''}`}>{section.label}</div>
              {section.items.map(m => (
                <button key={m.id} className={`nav-item${activeTab===m.id?' active':''}`}
                  onClick={()=>{setActiveTab(m.id);setSelected(null);}}>
                  <span className="nav-icon">{m.icon}</span>
                  <span style={{flex:1}}>{m.label}</span>
                  {m.badge>0&&<span className="nav-badge" title={m.badgeTitle||''}>{m.badge}</span>}
                </button>
              ))}
            </div>
          ))}

          {/* Bottom actions */}
          <div className="nav-bottom">
            <hr className="nav-divider" style={{margin:'0 0 8px'}}/>
            <button className="nav-bottom-btn" onClick={()=>setShowHelp(true)}>
              <span className="nav-icon">❓</span> Help & Guide
            </button>
            <button className="nav-bottom-btn" onClick={()=>setShowUsers(true)}>
              <span className="nav-icon">⚙️</span> Account & Users
            </button>
            <button className="nav-bottom-btn danger" onClick={handleLogout}>
              <span className="nav-icon">🚪</span> Sign Out
            </button>
          </div>
        </nav>

        {/* MODULE CONTENT */}
        <div className="module-content">

      {/* DASHBOARD MODULE */}
      {activeTab==='dashboard'&&<DashboardModule leads={leads} teamMembers={teamMembers} token={token} currentUser={currentUser}/>}

      {/* CONTACTS RESEARCH MODULE */}
      {activeTab==='research'&&<ResearchModule items={research} setItems={setResearch} onPromote={promoteLead} teamMembers={teamMembers} moduleLabel="Contacts Research Intelligence" sourceModuleTag="Contacts Research Intelligence"/>}

      {/* ERP RESEARCH MODULE */}
      {activeTab==='erp-research'&&<ResearchModule items={erpResearch} setItems={setErpResearch} onPromote={promoteLead} teamMembers={teamMembers} moduleLabel="Business/Technology Solutions Intelligence" sourceModuleTag="Business/Technology Solutions Intelligence" erpSystems={settings.erpSystems||DEFAULT_SETTINGS.erpSystems}/>}

      {/* COMPANY RESEARCH MODULE */}
      {activeTab==='company-research'&&<ResearchModule items={companyResearch} setItems={setCompanyResearch} onPromote={promoteLead} teamMembers={teamMembers} moduleLabel="Company Research Intelligence" sourceModuleTag="Company Research Intelligence" erpSystems={settings.erpSystems||DEFAULT_SETTINGS.erpSystems}/>}

      {/* CONTACT LOOKUP MODULE */}
      {activeTab==='contact-lookup'&&<ContactLookupModule token={token} settings={settings}/>}

      {/* WILDCARD SEARCH MODULE */}
      {activeTab==='wildcard-search'&&<WildcardSearchModule token={token} settings={settings}/>}

      {/* BIDS & RFQs MODULE */}
      {activeTab==='bids-rfq'&&<BidsRFQModule token={token} bids={bids} setBids={setBids} settings={settings}/>}

      {/* EVENTS & CONFERENCES MODULE */}
      {activeTab==='events'&&<EventsConferencesModule token={token} events={events} setEvents={setEvents} settings={settings}/>}

      {/* MAINTENANCE MODULE */}
      {activeTab==='maintenance'&&<MaintenanceModule settings={settings} setSettings={setSettings} onImportResearch={items=>setResearch(r=>[...items,...r.filter(x=>!items.find(i=>i.id===x.id))])} onImportERP={items=>setErpResearch(r=>[...items,...r.filter(x=>!items.find(i=>i.id===x.id))])} onExportNow={exportChanges} onRunResearch={async()=>{
        const r=await apiFetch('/api/run-erp-research','POST',null,token);
        if(r.ok&&r.added>0){const ed=await apiFetch('/api/erp-research','GET',null,token);if(ed.ok&&Array.isArray(ed.items))setErpResearch(ed.items);}
        const sd=await apiFetch('/api/settings','GET',null,token);
        if(sd.ok&&sd.settings)setSettings(s=>({...s,...sd.settings}));
        return r;
      }}
      onRunContactsResearch={async()=>{
        const r=await apiFetch('/api/run-contacts-research','POST',null,token);
        if(r.ok&&r.added>0){const rd=await apiFetch('/api/research','GET',null,token);if(rd.ok&&Array.isArray(rd.items))setResearch(rd.items);}
        const sd=await apiFetch('/api/settings','GET',null,token);
        if(sd.ok&&sd.settings)setSettings(s=>({...s,...sd.settings}));
        return r;
      }}
      onRunCompanyResearch={async()=>{
        const r=await apiFetch('/api/run-company-research','POST',null,token);
        if(r.ok&&r.added>0){const cd=await apiFetch('/api/company-research','GET',null,token);if(cd.ok&&Array.isArray(cd.items))setCompanyResearch(cd.items);}
        const sd=await apiFetch('/api/settings','GET',null,token);
        if(sd.ok&&sd.settings)setSettings(s=>({...s,...sd.settings}));
        return r;
      }}/>}

      {/* ACTIVE LEADS MODULE */}
      {activeTab==='leads'&&<>
        {fuAlerts.length>0&&(
          <div className="fu-banner">
            <span className="fu-banner-icon">📅</span>
            <span className="fu-banner-text"><strong>{fuAlerts.length} lead{fuAlerts.length>1?'s':''}</strong> need follow-up today or are overdue:</span>
            <div className="fu-banner-chips">
              {fuAlerts.slice(0,5).map(l=>(
                <button key={l.id} className="fu-chip" onClick={()=>setSelected(l)}>
                  {l.name}{isOverdue(l.followUpDate)?' ⚠':' ·'} {isOverdue(l.followUpDate)?'Overdue':'Today'}
                </button>
              ))}
              {fuAlerts.length>5&&<span style={{color:'var(--rh-crimson)',fontSize:12,fontWeight:500}}>+{fuAlerts.length-5} more</span>}
            </div>
          </div>
        )}
        <div className="toolbar">
          <div className="search-wrap"><span className="search-icon">🔍</span><input placeholder="Search leads…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <div className="filter-bar">
            <select className="select-sm" value={filterStage} onChange={e=>setFilterStage(e.target.value)}><option value="">All Stages</option>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
            <select className="select-sm" value={filterSector} onChange={e=>setFilterSector(e.target.value)}><option value="">All Sectors</option><option>Commercial</option><option>Federal</option></select>
            <select className="select-sm" value={filterLabel} onChange={e=>setFilterLabel(e.target.value)}><option value="">All Labels</option>{LABEL_DEFS.map(l=><option key={l.id} value={l.id}>{l.text}</option>)}</select>
            <select className="select-sm" value={filterSource} onChange={e=>setFilterSource(e.target.value)}><option value="">All Sources</option>{SOURCES.map(s=><option key={s}>{s}</option>)}</select>
            {hasFilters&&<button className="btn btn-ghost btn-sm" onClick={()=>{setFilterStage('');setFilterLabel('');setFilterSource('');setFilterSector('');}}>Clear ×</button>}
          </div>
          <div className="spacer"/>
          {checkedIds.size>0&&<button className="btn btn-danger btn-sm" onClick={deleteSelected}>🗑 Delete ({checkedIds.size})</button>}
          <button className="btn btn-ghost btn-sm export-pipedrive-btn" onClick={()=>exportToPipedrive(checkedIds.size>0?filtered.filter(l=>checkedIds.has(l.id)):filtered)} title="Export to Pipedrive-compatible CSV">⬇ Pipedrive CSV</button>
          <button className="btn btn-ghost btn-sm" onClick={exportChanges} title="Export only new/changed leads since last export">📤 Export Changes</button>
          <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Lead</button>
        </div>
        <div className="main">
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {filtered.length===0?(
              <div className="empty">
                <div className="empty-icon">📭</div>
                <strong>No leads found</strong>
                <span>{search||hasFilters?'Try adjusting your filters.':'Add your first lead to get started.'}</span>
                {!search&&!hasFilters&&<button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Lead</button>}
              </div>
            ):(
              <div className="table-wrap">
                <table className="leads-table">
                  <thead><tr>
                    <th style={{width:36}}><input type="checkbox" className="cb" checked={allChecked} onChange={toggleAll}/></th>
                    <th onClick={()=>toggleSort('name')}>Name / Org <SI k="name"/></th>
                    <th onClick={()=>toggleSort('stage')}>Stage <SI k="stage"/></th>
                    <th onClick={()=>toggleSort('followUpDate')}>Follow-Up <SI k="followUpDate"/></th>
                    <th onClick={()=>toggleSort('value')}>Value <SI k="value"/></th>
                    <th onClick={()=>toggleSort('serviceLine')}>Service Line <SI k="serviceLine"/></th>
                    <th onClick={()=>toggleSort('sourceModule')}>Source <SI k="sourceModule"/></th>
                    <th>Labels</th>
                    <th onClick={()=>toggleSort('lastActivity')}>Activity <SI k="lastActivity"/></th>
                  </tr></thead>
                  <tbody>
                    {filtered.map(lead=>{
                      const ov=isOverdue(lead.followUpDate),td=isDueToday(lead.followUpDate);
                      return (
                        <tr key={lead.id} className={`lead-row${selected?.id===lead.id?' selected':''}`} onClick={()=>setSelected(selected?.id===lead.id?null:lead)}>
                          <td onClick={e=>{e.stopPropagation();toggleCheck(lead.id);}}><input type="checkbox" className="cb" checked={checkedIds.has(lead.id)} onChange={()=>toggleCheck(lead.id)}/></td>
                          <td><div className="lead-name">{lead.name}</div>{lead.org&&<div className="lead-org">{lead.org}</div>}</td>
                          <td><StageBadge stage={lead.stage}/></td>
                          <td>{lead.followUpDate?<span className={`fu-date-cell${ov?' fu-overdue':td?' fu-today':''}`}>{ov&&'⚠ '}{fmtDate(lead.followUpDate)}</span>:<span style={{color:'var(--text-muted)',fontSize:12}}>—</span>}</td>
                          <td>{lead.value?<span className="lead-value">{fmtCurrency(lead.value)}</span>:<span className="no-value">—</span>}</td>
                          <td style={{fontSize:12,color:'var(--text-muted)',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lead.serviceLine||'—'}</td>
                          <td style={{fontSize:11,maxWidth:130}}>{lead.sourceModule?<span style={{background:'var(--rh-navy)',color:'#fff',padding:'2px 7px',borderRadius:8,whiteSpace:'nowrap',display:'inline-block',overflow:'hidden',textOverflow:'ellipsis',maxWidth:128}}>{lead.sourceModule}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                          <td style={{maxWidth:160}}>{lead.labels.slice(0,3).map(l=><LabelChip key={l} id={l}/>)}{lead.labels.length>3&&<span style={{fontSize:11,color:'var(--text-muted)',marginLeft:2}}>+{lead.labels.length-3}</span>}</td>
                          <td>{lead.activities.length>0?<span className="activity-dot"><span className="dot" style={{background:'var(--rh-teal)'}}></span>{lead.activities.length}</span>:<span style={{color:'var(--text-muted)',fontSize:12}}>—</span>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div style={{padding:'10px 16px',fontSize:12,color:'var(--text-muted)',borderTop:'1px solid var(--border)',background:'var(--surface)',display:'flex',gap:20,flexWrap:'wrap'}}>
                  <span>{filtered.length} lead{filtered.length!==1?'s':''}</span>
                  {totalValue>0&&<span>Pipeline: <strong style={{color:'var(--success)'}}>{fmtCurrency(totalValue)}</strong></span>}
                  {checkedIds.size>0&&<span>{checkedIds.size} selected · <button style={{background:'none',border:'none',color:'var(--rh-teal)',cursor:'pointer',fontSize:12,padding:0,fontFamily:'inherit'}} onClick={()=>exportToPipedrive(filtered.filter(l=>checkedIds.has(l.id)))}>Export selected to Pipedrive</button></span>}
                  {fuAlerts.length>0&&<span style={{color:'var(--rh-crimson)',fontWeight:500}}>📅 {fuAlerts.length} follow-up{fuAlerts.length>1?'s':''} due</span>}
                </div>
              </div>
            )}
          </div>
          {selected&&<SidePanel lead={selected} onClose={()=>setSelected(null)} onUpdate={updateLead} onDelete={deleteLead} onAdvanceStage={advanceStage}/>}
        </div>
        {showModal&&<LeadModal onSave={addLead} onClose={()=>setShowModal(false)}/>}
      </>}

        </div>{/* /module-content */}
      </div>{/* /app-body */}

      {showUsers&&<UserManagementModal token={token} currentUser={currentUser} onClose={()=>setShowUsers(false)}/>}
      {showHelp&&<HelpModal onClose={()=>setShowHelp(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
